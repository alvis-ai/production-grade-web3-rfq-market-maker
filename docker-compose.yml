services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      RFQ_QUOTE_TTL_SECONDS: 30
      RFQ_BODY_LIMIT_BYTES: 32768
      RFQ_CORS_ALLOWED_ORIGINS: http://localhost:5173
      RFQ_ENABLE_HSTS: "false"
      RFQ_TRUST_PROXY: "false"
      RFQ_RATE_LIMIT_BACKEND: redis
      RFQ_REDIS_URL: redis://redis:6379/0
      RFQ_SIGNER_PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      RFQ_SETTLEMENT_ADDRESS: 0x0000000000000000000000000000000000000004
      RFQ_ALLOW_SIMULATED_SETTLEMENT: "true"
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_RFQ_API_BASE_URL: http://localhost:3000
        VITE_RFQ_SETTLEMENT_ADDRESS: 0x0000000000000000000000000000000000000004
        VITE_WALLETCONNECT_PROJECT_ID: "00000000000000000000000000000000"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rfq_market_maker
      POSTGRES_USER: rfq
      POSTGRES_PASSWORD: rfq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfq -d rfq_market_maker"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./infra/prometheus:/etc/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres-data:
  clickhouse-data:
  grafana-data:
