services:
  database-migrate:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
    restart: "no"

  signer-service:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/signer-main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      database-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_QUOTE_TTL_SECONDS: 30
      RFQ_SIGNER_MODE: local
      RFQ_SIGNER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      RFQ_SETTLEMENT_ADDRESS: "0x0000000000000000000000000000000000000004"
      RFQ_SIGNER_SERVICE_TOKEN: devsigner_0123456789012345678901234567890123456789
      RFQ_SIGNER_SERVICE_HOST: 0.0.0.0
      RFQ_SIGNER_SERVICE_PORT: 3006
      RFQ_SIGNER_AUDIT_BACKEND: postgres
      RFQ_SIGNER_AUDIT_DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker?minPool=1&maxPool=3
      RFQ_SIGNER_AUDIT_TIMEOUT_MS: 2000
      RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":false},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
      RFQ_RISK_POLICY_JSON: '{"policyVersion":"token-limit-risk-v1","enabledChainIds":[1],"tokenLimits":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","maxAmountIn":"1000000000000000000000","minAmountOut":"1","maxNotionalUsd":"1000000","maxAbsoluteInventory":"10000000000000000000000"},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","maxAmountIn":"1000000000000000000000","minAmountOut":"1","maxNotionalUsd":"1000000","maxAbsoluteInventory":"10000000000000000000000"}],"restrictedUsers":[],"toxicFlowScores":[],"maxToxicScoreBps":8000,"maxUserOpenNotionalUsd":"2000000","maxPairOpenNotionalUsd":"5000000","portfolioVar":{"modelVersion":"component-sum-v1","maxPortfolioVarUsd":"500000","confidenceMultiplierBps":23300,"horizonSeconds":86400,"maxSnapshotAgeMs":5000,"maxFutureSkewMs":5000,"valuationPairs":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","usdReferenceTokenAddress":"0x0000000000000000000000000000000000000003"}]},"minLiquidityUsd":"1000000","maxVolatilityBps":500,"maxSlippageBps":500,"maxQuotedSpreadBps":1000}'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3006/ready"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    expose:
      - "3006"

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      database-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      signer-service:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_QUOTE_TTL_SECONDS: 30
      RFQ_QUOTE_IDEMPOTENCY_LEASE_MS: 60000
      RFQ_BODY_LIMIT_BYTES: 32768
      RFQ_SUBMIT_RESERVATION_LEASE_MS: 900000
      RFQ_CORS_ALLOWED_ORIGINS: http://localhost:5173
      RFQ_ENABLE_HSTS: "false"
      RFQ_TRUST_PROXY: "false"
      RFQ_RATE_LIMIT_BACKEND: redis
      RFQ_REDIS_URL: redis://redis:6379/0
      RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":false},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
      RFQ_RISK_POLICY_JSON: '{"policyVersion":"token-limit-risk-v1","enabledChainIds":[1],"tokenLimits":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","maxAmountIn":"1000000000000000000000","minAmountOut":"1","maxNotionalUsd":"1000000","maxAbsoluteInventory":"10000000000000000000000"},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","maxAmountIn":"1000000000000000000000","minAmountOut":"1","maxNotionalUsd":"1000000","maxAbsoluteInventory":"10000000000000000000000"}],"restrictedUsers":[],"toxicFlowScores":[],"maxToxicScoreBps":8000,"maxUserOpenNotionalUsd":"2000000","maxPairOpenNotionalUsd":"5000000","portfolioVar":{"modelVersion":"component-sum-v1","maxPortfolioVarUsd":"500000","confidenceMultiplierBps":23300,"horizonSeconds":86400,"maxSnapshotAgeMs":5000,"maxFutureSkewMs":5000,"valuationPairs":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","usdReferenceTokenAddress":"0x0000000000000000000000000000000000000003"}]},"minLiquidityUsd":"1000000","maxVolatilityBps":500,"maxSlippageBps":500,"maxQuotedSpreadBps":1000}'
      RFQ_TOXIC_FLOW_MAX_SCORE_AGE_MS: "86400000"
      RFQ_TOXIC_FLOW_MAX_FUTURE_SKEW_MS: "60000"
      RFQ_TOXIC_FLOW_MIN_SAMPLE_SIZE: "5"
      RFQ_CEX_PAIRS: ${RFQ_CEX_PAIRS:-}
      RFQ_CEX_REQUIRE_LIVE_BOOK: ${RFQ_CEX_REQUIRE_LIVE_BOOK:-false}
      RFQ_CEX_DEPTH_RANGE_BPS: ${RFQ_CEX_DEPTH_RANGE_BPS:-50}
      RFQ_CEX_FLUSH_INTERVAL_MS: ${RFQ_CEX_FLUSH_INTERVAL_MS:-100}
      RFQ_CEX_VOLATILITY_SAMPLE_SIZE: ${RFQ_CEX_VOLATILITY_SAMPLE_SIZE:-10}
      RFQ_CEX_MAX_SOURCE_AGE_MS: ${RFQ_CEX_MAX_SOURCE_AGE_MS:-2000}
      RFQ_CEX_MAX_FUTURE_SKEW_MS: ${RFQ_CEX_MAX_FUTURE_SKEW_MS:-1000}
      RFQ_CEX_MIN_SOURCES: ${RFQ_CEX_MIN_SOURCES:-2}
      RFQ_CEX_MAX_SOURCE_DEVIATION_BPS: ${RFQ_CEX_MAX_SOURCE_DEVIATION_BPS:-100}
      RFQ_CEX_MAX_SPREAD_BPS: ${RFQ_CEX_MAX_SPREAD_BPS:-100}
      RFQ_HEDGE_FAILURE_PENALTY_BPS: ${RFQ_HEDGE_FAILURE_PENALTY_BPS:-25}
      RFQ_HEDGE_MAX_FAILURE_PENALTY_BPS: ${RFQ_HEDGE_MAX_FAILURE_PENALTY_BPS:-150}
      RFQ_HEDGE_FAILURE_LOOKBACK_MS: ${RFQ_HEDGE_FAILURE_LOOKBACK_MS:-300000}
      RFQ_HEDGE_ROUTES_JSON: '{"routes":[{"chainId":1,"token":"0x0000000000000000000000000000000000000002","venue":"binance","symbol":"ETHUSDT","baseAsset":"ETH","quoteAsset":"USDT","quoteToken":"0x0000000000000000000000000000000000000003","tokenDecimals":18,"quoteTokenDecimals":18,"stepSizeRaw":"100000000000000","priceTick":"0.01","maxSlippageBps":100}]}'
      RFQ_BINANCE_BASE_URL: ${RFQ_BINANCE_BASE_URL:-https://testnet.binance.vision}
      RFQ_BINANCE_REQUEST_TIMEOUT_MS: 10000
      RFQ_BINANCE_SYMBOL_RULES_MAX_AGE_MS: 300000
      RFQ_SIGNER_MODE: remote
      RFQ_SIGNER_SERVICE_URL: http://signer-service:3006
      RFQ_SIGNER_SERVICE_TOKEN: devsigner_0123456789012345678901234567890123456789
      RFQ_SIGNER_SERVICE_ALLOW_INSECURE_HTTP: "true"
      RFQ_TRUSTED_SIGNER_ADDRESS: "0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266"
      RFQ_SETTLEMENT_ADDRESS: "0x0000000000000000000000000000000000000004"
      RFQ_ALLOW_SIMULATED_SETTLEMENT: "true"
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
    ports:
      - "3000:3000"

  hedge-worker:
    profiles: ["hedge"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/hedge-worker-main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      database-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
      RFQ_HEDGE_WORKER_HOST: 0.0.0.0
      RFQ_HEDGE_WORKER_PORT: 3001
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_HEDGE_LEASE_MS: 45000
      RFQ_HEDGE_POLL_INTERVAL_MS: 250
      RFQ_HEDGE_RETRY_DELAY_MS: 1000
      RFQ_HEDGE_MAX_ORDER_AGE_MS: 30000
      RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":false},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
      RFQ_HEDGE_ROUTES_JSON: '{"routes":[{"chainId":1,"token":"0x0000000000000000000000000000000000000002","venue":"binance","symbol":"ETHUSDT","baseAsset":"ETH","quoteAsset":"USDT","quoteToken":"0x0000000000000000000000000000000000000003","tokenDecimals":18,"quoteTokenDecimals":18,"stepSizeRaw":"100000000000000","priceTick":"0.01","maxSlippageBps":100}]}'
      RFQ_BINANCE_API_KEY: ${RFQ_BINANCE_API_KEY:-replace-with-binance-api-key}
      RFQ_BINANCE_API_SECRET: ${RFQ_BINANCE_API_SECRET:-replace-with-binance-api-secret}
      RFQ_BINANCE_BASE_URL: ${RFQ_BINANCE_BASE_URL:-https://testnet.binance.vision}
      RFQ_BINANCE_RECV_WINDOW_MS: 5000
      RFQ_BINANCE_REQUEST_TIMEOUT_MS: 10000
      RFQ_BINANCE_SYMBOL_RULES_MAX_AGE_MS: 300000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    expose:
      - "3001"

  analytics-worker:
    profiles: ["analytics"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/analytics-worker-main.js"]
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      redpanda-topic-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
      RFQ_ANALYTICS_WORKER_HOST: 0.0.0.0
      RFQ_ANALYTICS_WORKER_PORT: 3002
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_ANALYTICS_KAFKA_BROKERS: redpanda:9092
      RFQ_ANALYTICS_KAFKA_TOPIC: rfq.analytics.v1
      RFQ_ANALYTICS_KAFKA_CLIENT_ID: rfq-analytics
      RFQ_ANALYTICS_KAFKA_GROUP_ID: rfq-clickhouse-v1
      RFQ_ANALYTICS_KAFKA_SSL: "false"
      RFQ_ANALYTICS_BATCH_SIZE: 10
      RFQ_ANALYTICS_LEASE_MS: 120000
      RFQ_ANALYTICS_POLL_INTERVAL_MS: 250
      RFQ_ANALYTICS_RETRY_DELAY_MS: 1000
      RFQ_CLICKHOUSE_URL: http://clickhouse:8123
      RFQ_CLICKHOUSE_USERNAME: default
      RFQ_CLICKHOUSE_PASSWORD: ""
      RFQ_CLICKHOUSE_DATABASE: default
      RFQ_CLICKHOUSE_ANALYTICS_TABLE: rfq_analytics_events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    ports:
      - "3002:3002"

  reconciliation-worker:
    profiles: ["reconciliation"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/reconciliation-worker-main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      database-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
      RFQ_RECONCILIATION_WORKER_HOST: 0.0.0.0
      RFQ_RECONCILIATION_WORKER_PORT: 3003
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_RECONCILIATION_LEASE_MS: 30000
      RFQ_RECONCILIATION_POLL_INTERVAL_MS: 250
      RFQ_RECONCILIATION_RETRY_DELAY_MS: 1000
      RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":false},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    ports:
      - "3003:3003"

  settlement-indexer:
    profiles: ["indexer"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/settlement-indexer-main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      database-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
      RFQ_SETTLEMENT_INDEXER_HOST: 0.0.0.0
      RFQ_SETTLEMENT_INDEXER_PORT: 3004
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_SETTLEMENT_INDEXER_LEASE_MS: 30000
      RFQ_SETTLEMENT_INDEXER_POLL_INTERVAL_MS: 1000
      RFQ_SETTLEMENT_INDEXER_READINESS_STALE_MS: 60000
      RFQ_SETTLEMENT_INDEXER_CONFIG_JSON: '{"chains":[{"chainId":31337,"rpcUrl":"http://host.docker.internal:8545","settlementAddress":"0x0000000000000000000000000000000000000004","startBlock":0,"confirmations":1,"maxBlockRange":100,"reorgLookbackBlocks":1000,"requestTimeoutMs":5000}]}'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3004/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    ports:
      - "3004:3004"

  toxic-flow-analyzer:
    profiles: ["toxic-flow"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "backend/dist/toxic-flow-analyzer-main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      database-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rfq:rfq@postgres:5432/rfq_market_maker
      RFQ_TOXIC_FLOW_ANALYZER_HOST: 0.0.0.0
      RFQ_TOXIC_FLOW_ANALYZER_PORT: 3005
      RFQ_LOG_LEVEL: ${RFQ_LOG_LEVEL:-info}
      RFQ_SHUTDOWN_TIMEOUT_MS: 20000
      RFQ_TOXIC_FLOW_ANALYZER_LEASE_MS: 30000
      RFQ_TOXIC_FLOW_ANALYZER_POLL_INTERVAL_MS: 250
      RFQ_TOXIC_FLOW_ANALYZER_RETRY_DELAY_MS: 1000
      RFQ_TOXIC_FLOW_MARKOUT_HORIZON_SECONDS: 300
      RFQ_TOXIC_FLOW_MARKOUT_MAX_SNAPSHOT_LAG_SECONDS: 900
      RFQ_TOXIC_FLOW_SCORE_WINDOW_SECONDS: 86400
      RFQ_TOXIC_FLOW_SCORE_SCALE: 100
      RFQ_TOXIC_FLOW_ANALYZER_POLICY_VERSION: markout-v1
      RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":false},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    ports:
      - "3005:3005"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:8080"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rfq_market_maker
      POSTGRES_USER: rfq
      POSTGRES_PASSWORD: rfq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfq -d rfq_market_maker"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "-X", "brokers=127.0.0.1:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "19092:19092"

  redpanda-topic-init:
    profiles: ["analytics"]
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["rpk", "topic", "create", "rfq.analytics.v1", "-X", "brokers=redpanda:9092", "--partitions", "6", "--replicas", "1", "--if-not-exists"]
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./infra/prometheus:/etc/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres-data:
  clickhouse-data:
  grafana-data:
