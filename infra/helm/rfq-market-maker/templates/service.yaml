apiVersion: v1
kind: Service
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "rfq-market-maker.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
