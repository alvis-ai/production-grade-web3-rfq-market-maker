{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.frontend.enabled }}
        - podSelector:
            matchLabels:
              {{- include "rfq-market-maker.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
        {{- end }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiIngressNamespaceLabels | nindent 14 }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.monitoringNamespaceLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    {{- if .Values.signerService.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "rfq-market-maker.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: signer
      ports:
        - protocol: TCP
          port: {{ .Values.signerService.port }}
    {{- end }}
{{- end }}
