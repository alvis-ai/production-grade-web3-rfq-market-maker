{{- if and .Values.toxicFlowAnalyzer.enabled .Values.toxicFlowAnalyzer.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-toxic-flow-analyzer
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: toxic-flow-analyzer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.monitoringNamespaceLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.toxicFlowAnalyzer.port }}
  egress: []
{{- end }}
