{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-frontend
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        checksum/frontend-config: {{ include (print $.Template.BasePath "/frontend-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      topologySpreadConstraints:
        {{- include "rfq-market-maker.topologySpreadConstraints" (list . "frontend") | nindent 8 }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "rfq-market-maker.frontendImage" . | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.frontend.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: frontend-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: frontend-config
              mountPath: /etc/nginx/rfq-proxy.conf
              subPath: rfq-proxy.conf
              readOnly: true
            - name: frontend-config
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
              readOnly: true
            - name: api-key
              mountPath: /etc/nginx/secrets/api-key.conf
              subPath: api-key.conf
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpVolumeSizeLimit | quote }}
        - name: frontend-config
          configMap:
            name: {{ include "rfq-market-maker.fullname" . }}-frontend
        - name: api-key
          secret:
            secretName: {{ .Values.frontend.apiKeySecret.name }}
            defaultMode: 0440
            items:
              - key: {{ .Values.frontend.apiKeySecret.configKey }}
                path: api-key.conf
{{- end }}
