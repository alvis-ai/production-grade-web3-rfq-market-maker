{{- if .Values.disruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  maxUnavailable: {{ .Values.disruptionBudget.maxUnavailable }}
  unhealthyPodEvictionPolicy: {{ .Values.disruptionBudget.unhealthyPodEvictionPolicy }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
