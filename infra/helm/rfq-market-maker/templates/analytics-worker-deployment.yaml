{{- if .Values.analyticsWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-analytics-worker
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: analytics-worker
spec:
  replicas: {{ .Values.analyticsWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: analytics-worker
  template:
    metadata:
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: analytics-worker
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      topologySpreadConstraints:
        {{- include "rfq-market-maker.topologySpreadConstraints" (list . "analytics-worker") | nindent 8 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: database-migrate
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/db/migrate.js"]
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for database transport policy" .Values.env.NODE_ENV | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migrationSecret.name }}
                  key: {{ .Values.migrationSecret.urlKey }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: analytics-worker
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/analytics-worker-main.js"]
          ports:
            - name: http
              containerPort: {{ .Values.analyticsWorker.port }}
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for worker transport policy" .Values.env.NODE_ENV | quote }}
            - name: RFQ_SHUTDOWN_TIMEOUT_MS
              value: {{ required "env.RFQ_SHUTDOWN_TIMEOUT_MS is required" (index .Values.env "RFQ_SHUTDOWN_TIMEOUT_MS") | quote }}
            {{- range $key, $value := .Values.analyticsWorker.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.analyticsWorker.secret.name }}
                  key: {{ .Values.analyticsWorker.secret.databaseUrlKey }}
            - name: RFQ_ANALYTICS_KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.analyticsWorker.secret.name }}
                  key: {{ .Values.analyticsWorker.secret.kafkaUsernameKey }}
            - name: RFQ_ANALYTICS_KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.analyticsWorker.secret.name }}
                  key: {{ .Values.analyticsWorker.secret.kafkaPasswordKey }}
            - name: RFQ_CLICKHOUSE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.analyticsWorker.secret.name }}
                  key: {{ .Values.analyticsWorker.secret.clickhouseUsernameKey }}
            - name: RFQ_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.analyticsWorker.secret.name }}
                  key: {{ .Values.analyticsWorker.secret.clickhousePasswordKey }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.analyticsWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpVolumeSizeLimit | quote }}
{{- end }}
