{{- if .Values.hedgeWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-hedge-worker
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: hedge-worker
spec:
  replicas: {{ .Values.hedgeWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hedge-worker
  template:
    metadata:
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hedge-worker
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      topologySpreadConstraints:
        {{- include "rfq-market-maker.topologySpreadConstraints" (list . "hedge-worker") | nindent 8 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: database-migrate
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/db/migrate.js"]
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for database transport policy" .Values.env.NODE_ENV | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migrationSecret.name }}
                  key: {{ .Values.migrationSecret.urlKey }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: hedge-worker
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/hedge-worker-main.js"]
          ports:
            - name: http
              containerPort: {{ .Values.hedgeWorker.port }}
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for worker transport policy" .Values.env.NODE_ENV | quote }}
            - name: RFQ_SHUTDOWN_TIMEOUT_MS
              value: {{ required "env.RFQ_SHUTDOWN_TIMEOUT_MS is required" (index .Values.env "RFQ_SHUTDOWN_TIMEOUT_MS") | quote }}
            {{- range $key, $value := .Values.hedgeWorker.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: RFQ_TOKEN_REGISTRY_JSON
              value: {{ required "env.RFQ_TOKEN_REGISTRY_JSON is required for hedge route decimals" (index .Values.env "RFQ_TOKEN_REGISTRY_JSON") | quote }}
            - name: RFQ_HEDGE_ROUTES_JSON
              value: {{ required "env.RFQ_HEDGE_ROUTES_JSON is required for shared API/worker route binding" (index .Values.env "RFQ_HEDGE_ROUTES_JSON") | quote }}
            - name: RFQ_BINANCE_BASE_URL
              value: {{ required "env.RFQ_BINANCE_BASE_URL is required for shared API/worker venue rules" (index .Values.env "RFQ_BINANCE_BASE_URL") | quote }}
            - name: RFQ_BINANCE_REQUEST_TIMEOUT_MS
              value: {{ required "env.RFQ_BINANCE_REQUEST_TIMEOUT_MS is required for shared API/worker venue rules" (index .Values.env "RFQ_BINANCE_REQUEST_TIMEOUT_MS") | quote }}
            - name: RFQ_BINANCE_SYMBOL_RULES_MAX_AGE_MS
              value: {{ required "env.RFQ_BINANCE_SYMBOL_RULES_MAX_AGE_MS is required for shared API/worker venue rules" (index .Values.env "RFQ_BINANCE_SYMBOL_RULES_MAX_AGE_MS") | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hedgeWorker.secret.name }}
                  key: {{ .Values.hedgeWorker.secret.databaseUrlKey }}
            - name: RFQ_BINANCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hedgeWorker.secret.name }}
                  key: {{ .Values.hedgeWorker.secret.apiKeyKey }}
            - name: RFQ_BINANCE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hedgeWorker.secret.name }}
                  key: {{ .Values.hedgeWorker.secret.apiSecretKey }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.hedgeWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpVolumeSizeLimit | quote }}
{{- end }}
