{{- if .Values.settlementIndexer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-settlement-indexer
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: settlement-indexer
spec:
  replicas: {{ .Values.settlementIndexer.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: settlement-indexer
  template:
    metadata:
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: settlement-indexer
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      topologySpreadConstraints:
        {{- include "rfq-market-maker.topologySpreadConstraints" (list . "settlement-indexer") | nindent 8 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: database-migrate
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/db/migrate.js"]
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for database transport policy" .Values.env.NODE_ENV | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migrationSecret.name }}
                  key: {{ .Values.migrationSecret.urlKey }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: settlement-indexer
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/settlement-indexer-main.js"]
          ports:
            - name: http
              containerPort: {{ .Values.settlementIndexer.port }}
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for worker transport policy" .Values.env.NODE_ENV | quote }}
            {{- range $key, $value := .Values.settlementIndexer.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.settlementIndexer.secret.name }}
                  key: {{ .Values.settlementIndexer.secret.databaseUrlKey }}
            - name: RFQ_SETTLEMENT_INDEXER_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.settlementIndexer.secret.name }}
                  key: {{ .Values.settlementIndexer.secret.configJsonKey }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.settlementIndexer.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpVolumeSizeLimit | quote }}
{{- end }}
