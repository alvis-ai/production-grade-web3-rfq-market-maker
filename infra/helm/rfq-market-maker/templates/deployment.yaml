apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: RFQ_SIGNER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.privateKeyKey }}
            - name: RFQ_SETTLEMENT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.settlementAddressKey }}
            {{- if .Values.chainlinkConfigSecret.enabled }}
            - name: RFQ_CHAINLINK_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chainlinkConfigSecret.name }}
                  key: {{ .Values.chainlinkConfigSecret.key }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
