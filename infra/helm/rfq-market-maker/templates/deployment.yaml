apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:
        - name: database-migrate
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "backend/dist/db/migrate.js"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migrationSecret.name }}
                  key: {{ .Values.migrationSecret.urlKey }}
      containers:
        - name: backend
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: RFQ_AWS_KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.kmsKeyIdKey }}
            - name: RFQ_TRUSTED_SIGNER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.trustedSignerAddressKey }}
            {{- if .Values.signerSecret.trustedSignerOverlapAddresses.enabled }}
            - name: RFQ_TRUSTED_SIGNER_OVERLAP_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.trustedSignerOverlapAddresses.key }}
            {{- end }}
            - name: RFQ_SETTLEMENT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.settlementAddressKey }}
            - name: RFQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisSecret.name }}
                  key: {{ .Values.redisSecret.urlKey }}
            - name: RFQ_API_KEY_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeySecret.name }}
                  key: {{ .Values.apiKeySecret.configKey }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseSecret.name }}
                  key: {{ .Values.databaseSecret.urlKey }}
            {{- if .Values.chainlinkConfigSecret.enabled }}
            - name: RFQ_CHAINLINK_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chainlinkConfigSecret.name }}
                  key: {{ .Values.chainlinkConfigSecret.key }}
            {{- end }}
            {{- if .Values.receiptConfigSecret.enabled }}
            - name: RFQ_RECEIPT_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.receiptConfigSecret.name }}
                  key: {{ .Values.receiptConfigSecret.key }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
