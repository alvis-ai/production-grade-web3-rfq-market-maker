{{- include "rfq-market-maker.validateShutdownBudget" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "rfq-market-maker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      topologySpreadConstraints:
        {{- include "rfq-market-maker.topologySpreadConstraints" (list . "api") | nindent 8 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: database-migrate
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node", "backend/dist/db/migrate.js"]
          env:
            - name: NODE_ENV
              value: {{ required "env.NODE_ENV is required for database transport policy" .Values.env.NODE_ENV | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migrationSecret.name }}
                  key: {{ .Values.migrationSecret.urlKey }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: backend
          image: {{ include "rfq-market-maker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: RFQ_SIGNER_SERVICE_URL
              value: {{ printf "https://%s-signer:%v" (include "rfq-market-maker.fullname" .) .Values.signerService.port | quote }}
            - name: RFQ_SIGNER_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.authTokenKey }}
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/rfq-signer-ca/ca.crt
            - name: RFQ_TRUSTED_SIGNER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.trustedSignerAddressKey }}
            {{- if .Values.signerSecret.trustedSignerOverlapAddresses.enabled }}
            - name: RFQ_TRUSTED_SIGNER_OVERLAP_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.trustedSignerOverlapAddresses.key }}
            {{- end }}
            - name: RFQ_SETTLEMENT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signerSecret.name }}
                  key: {{ .Values.signerSecret.settlementAddressKey }}
            - name: RFQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisSecret.name }}
                  key: {{ .Values.redisSecret.urlKey }}
            - name: RFQ_API_KEY_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeySecret.name }}
                  key: {{ .Values.apiKeySecret.configKey }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseSecret.name }}
                  key: {{ .Values.databaseSecret.urlKey }}
            {{- if .Values.chainlinkConfigSecret.enabled }}
            - name: RFQ_CHAINLINK_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chainlinkConfigSecret.name }}
                  key: {{ .Values.chainlinkConfigSecret.key }}
            {{- end }}
            {{- if .Values.usdReferenceConfigSecret.enabled }}
            - name: RFQ_USD_REFERENCE_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.usdReferenceConfigSecret.name }}
                  key: {{ .Values.usdReferenceConfigSecret.key }}
            {{- end }}
            {{- if .Values.receiptConfigSecret.enabled }}
            - name: RFQ_RECEIPT_CONFIG_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.receiptConfigSecret.name }}
                  key: {{ .Values.receiptConfigSecret.key }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: signer-ca
              mountPath: /etc/rfq-signer-ca
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpVolumeSizeLimit | quote }}
        - name: signer-ca
          secret:
            secretName: {{ .Values.signerSecret.name }}
            items:
              - key: {{ .Values.signerSecret.caCertKey }}
                path: ca.crt
