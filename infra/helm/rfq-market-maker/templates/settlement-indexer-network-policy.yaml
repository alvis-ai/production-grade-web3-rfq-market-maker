{{- if and .Values.settlementIndexer.enabled .Values.settlementIndexer.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-settlement-indexer
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: settlement-indexer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.monitoringNamespaceLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.settlementIndexer.port }}
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 5432
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
