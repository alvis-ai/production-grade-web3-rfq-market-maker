{{- define "rfq-market-maker.ciliumFqdnEgressRules" -}}
- toEndpoints:
    - matchLabels:
        {{- toYaml .root.Values.networkPolicy.fqdnEgress.dns.endpointLabels | nindent 8 }}
  toPorts:
    - ports:
        - port: {{ .root.Values.networkPolicy.fqdnEgress.dns.port | quote }}
          protocol: ANY
      rules:
        dns:
          - matchPattern: "*"
{{- range .endpoints }}
- toFQDNs:
    - matchName: {{ .hostname | quote }}
  toPorts:
    - ports:
        - port: {{ .port | quote }}
          protocol: TCP
{{- end }}
{{- end }}
{{- if and .Values.networkPolicy.enabled .Values.networkPolicy.fqdnEgress.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "rfq-market-maker.fullname" . }}-fqdn-egress
  labels:
    {{- include "rfq-market-maker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  endpointSelector:
    matchLabels:
      {{- include "rfq-market-maker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  egress:
    {{- include "rfq-market-maker.ciliumFqdnEgressRules" (dict "root" . "endpoints" .Values.networkPolicy.fqdnEgress.api) | nindent 4 }}
