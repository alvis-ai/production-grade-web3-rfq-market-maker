replicaCount: 2

image:
  repository: ghcr.io/example/rfq-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "3000"

env:
  NODE_ENV: production
  HOST: "0.0.0.0"
  PORT: "3000"
  RFQ_LOG_LEVEL: info

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
