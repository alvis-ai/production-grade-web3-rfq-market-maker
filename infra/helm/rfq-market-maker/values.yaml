replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
disruptionBudget:
  enabled: true
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
topologySpread:
  enabled: true
  maxSkew: 1
  minDomains: 2
  whenUnsatisfiable: DoNotSchedule
  topologyKeys:
    - kubernetes.io/hostname
    - topology.kubernetes.io/zone
terminationGracePeriodSeconds: 30
preStopSleepSeconds: 5
tmpVolumeSizeLimit: 16Mi
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
serviceAccount:
  create: true
  name: rfq-backend
  automountServiceAccountToken: false
  annotations: {}

signerService:
  enabled: true
  replicaCount: 2
  port: 3006
  serviceAccount:
    create: true
    name: rfq-signer-kms
    annotations:
      eks.amazonaws.com/role-arn: replace-with-kms-signing-role-arn
      eks.amazonaws.com/sts-regional-endpoints: "true"
  secret:
    name: rfq-signer-secrets
    kmsKeyIdKey: RFQ_AWS_KMS_KEY_ID
    authTokenKey: RFQ_SIGNER_SERVICE_TOKEN
    trustedSignerAddressKey: RFQ_TRUSTED_SIGNER_ADDRESS
    settlementAddressKey: RFQ_SETTLEMENT_ADDRESS
    auditDatabaseUrlKey: RFQ_SIGNER_AUDIT_DATABASE_URL
    tlsCertKey: tls.crt
    tlsKeyKey: tls.key
    databaseCaCertKey: database-ca.crt
  awsRegion: us-east-1
  awsMaxAttempts: 3
  maxClockSkewSeconds: 5
  bodyLimitBytes: 32768
  auditTimeoutMs: 2000
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

image:
  repository: ghcr.io/example/rfq-backend
  tag: "0.1.0"
  digest: ""
  pullPolicy: IfNotPresent

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/example/rfq-frontend
    tag: "0.1.0"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    port: 8080
  apiKeySecret:
    name: rfq-frontend-api-key
    configKey: api-key.conf
  runtimeConfig:
    settlementAddress: ""
    walletConnectProjectId: replace-with-walletconnect-project-id
  ingress:
    enabled: true
    className: nginx
    host: app.example.com
    tlsSecretName: rfq-frontend-tls
    sourceRanges:
      - 10.0.0.0/8
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

service:
  type: ClusterIP
  port: 3000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "3000"

networkPolicy:
  enabled: true
  apiIngressNamespaceLabels:
    kubernetes.io/metadata.name: ingress-nginx
  monitoringNamespaceLabels:
    kubernetes.io/metadata.name: monitoring
  fqdnEgress:
    enabled: true
    dns:
      endpointLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
      port: 53
    api:
      - hostname: postgres.example.com
        port: 5432
      - hostname: redis.example.com
        port: 6380
      - hostname: api.binance.com
        port: 443
      - hostname: stream.binance.com
        port: 9443
      - hostname: ws-feed.exchange.coinbase.com
        port: 443
      - hostname: replace-with-production-rpc.example.com
        port: 443
    signer:
      - hostname: postgres.example.com
        port: 5432
      - hostname: kms.us-east-1.amazonaws.com
        port: 443
      - hostname: sts.us-east-1.amazonaws.com
        port: 443
    hedgeWorker:
      - hostname: postgres.example.com
        port: 5432
      - hostname: api.binance.com
        port: 443
    analyticsWorker:
      - hostname: postgres.example.com
        port: 5432
      - hostname: redpanda.example.internal
        port: 9093
      - hostname: clickhouse.example.internal
        port: 8443
    reconciliationWorker:
      - hostname: postgres.example.com
        port: 5432
    settlementIndexer:
      - hostname: postgres.example.com
        port: 5432
      - hostname: replace-with-production-rpc.example.com
        port: 443
    toxicFlowAnalyzer:
      - hostname: postgres.example.com
        port: 5432

env:
  NODE_ENV: production
  HOST: "0.0.0.0"
  PORT: "3000"
  RFQ_LOG_LEVEL: info
  RFQ_SHUTDOWN_TIMEOUT_MS: "20000"
  RFQ_QUOTE_TTL_SECONDS: "30"
  RFQ_QUOTE_IDEMPOTENCY_LEASE_MS: "60000"
  RFQ_BODY_LIMIT_BYTES: "32768"
  RFQ_SUBMIT_RESERVATION_LEASE_MS: "900000"
  RFQ_CORS_ALLOWED_ORIGINS: "https://app.example.com"
  RFQ_ENABLE_HSTS: "true"
  RFQ_TRUST_PROXY: "false"
  RFQ_RATE_LIMIT_BACKEND: redis
  RFQ_SIGNER_MODE: remote
  RFQ_SIGNER_SERVICE_REQUEST_TIMEOUT_MS: "5000"
  RFQ_MARKET_DATA_PROVIDER: static
  RFQ_CEX_PAIRS: "1:0x0000000000000000000000000000000000000002:0x0000000000000000000000000000000000000003:binance:ETHUSDT:hedge,1:0x0000000000000000000000000000000000000002:0x0000000000000000000000000000000000000003:coinbase:ETH-USD:reference"
  RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":false},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
  RFQ_RISK_POLICY_JSON: '{"policyVersion":"token-limit-risk-v1","enabledChainIds":[1],"tokenLimits":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","maxAmountIn":"1000000000000000000000","minAmountOut":"1","maxNotionalUsd":"1000000","maxAbsoluteInventory":"10000000000000000000000"},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","maxAmountIn":"1000000000000000000000","minAmountOut":"1","maxNotionalUsd":"1000000","maxAbsoluteInventory":"10000000000000000000000"}],"restrictedUsers":[],"toxicFlowScores":[],"maxToxicScoreBps":8000,"maxUserOpenNotionalUsd":"2000000","maxPairOpenNotionalUsd":"5000000","portfolioVar":{"modelVersion":"component-sum-v1","maxPortfolioVarUsd":"500000","confidenceMultiplierBps":23300,"horizonSeconds":86400,"maxSnapshotAgeMs":5000,"maxFutureSkewMs":5000,"valuationPairs":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","usdReferenceTokenAddress":"0x0000000000000000000000000000000000000003"}]},"minLiquidityUsd":"1000000","maxVolatilityBps":500,"maxSlippageBps":500,"maxQuotedSpreadBps":1000}'
  RFQ_TOXIC_FLOW_MAX_SCORE_AGE_MS: "86400000"
  RFQ_TOXIC_FLOW_MAX_FUTURE_SKEW_MS: "60000"
  RFQ_TOXIC_FLOW_MIN_SAMPLE_SIZE: "5"
  RFQ_CEX_REQUIRE_LIVE_BOOK: "true"
  RFQ_CEX_DEPTH_RANGE_BPS: "50"
  RFQ_CEX_FLUSH_INTERVAL_MS: "100"
  RFQ_CEX_VOLATILITY_SAMPLE_SIZE: "10"
  RFQ_CEX_MAX_SOURCE_AGE_MS: "2000"
  RFQ_CEX_MAX_FUTURE_SKEW_MS: "1000"
  RFQ_CEX_MIN_SOURCES: "2"
  RFQ_CEX_MAX_SOURCE_DEVIATION_BPS: "100"
  RFQ_CEX_MAX_SPREAD_BPS: "100"
  RFQ_HEDGE_FAILURE_PENALTY_BPS: "25"
  RFQ_HEDGE_MAX_FAILURE_PENALTY_BPS: "150"
  RFQ_HEDGE_FAILURE_LOOKBACK_MS: "300000"
  RFQ_HEDGE_ROUTES_JSON: '{"routes":[{"chainId":1,"token":"0x0000000000000000000000000000000000000002","venue":"binance","symbol":"ETHUSDT","baseAsset":"ETH","quoteAsset":"USDT","quoteToken":"0x0000000000000000000000000000000000000003","tokenDecimals":18,"quoteTokenDecimals":18,"stepSizeRaw":"100000000000000","priceTick":"0.01","maxSlippageBps":100}]}'
  RFQ_BINANCE_BASE_URL: "https://api.binance.com"
  RFQ_BINANCE_REQUEST_TIMEOUT_MS: "10000"
  RFQ_BINANCE_SYMBOL_RULES_MAX_AGE_MS: "300000"
  RFQ_ALLOW_SIMULATED_SETTLEMENT: "false"

signerSecret:
  name: rfq-backend-secrets
  authTokenKey: RFQ_SIGNER_SERVICE_TOKEN
  caCertKey: ca.crt
  trustedSignerAddressKey: RFQ_TRUSTED_SIGNER_ADDRESS
  trustedSignerOverlapAddresses:
    enabled: false
    key: RFQ_TRUSTED_SIGNER_OVERLAP_ADDRESSES
  settlementAddressKey: RFQ_SETTLEMENT_ADDRESS

chainlinkConfigSecret:
  enabled: false
  name: rfq-backend-secrets
  key: RFQ_CHAINLINK_CONFIG_JSON

receiptConfigSecret:
  enabled: true
  name: rfq-backend-secrets
  key: RFQ_RECEIPT_CONFIG_JSON

redisSecret:
  name: rfq-backend-secrets
  urlKey: RFQ_REDIS_URL

apiKeySecret:
  name: rfq-backend-secrets
  configKey: RFQ_API_KEY_CONFIG_JSON

databaseSecret:
  name: rfq-backend-secrets
  urlKey: DATABASE_URL

migrationSecret:
  name: rfq-database-migration-secrets
  urlKey: DATABASE_URL

hedgeWorker:
  enabled: true
  replicaCount: 2
  port: 3001
  env:
    RFQ_LOG_LEVEL: info
    RFQ_HEDGE_WORKER_HOST: "0.0.0.0"
    RFQ_HEDGE_WORKER_PORT: "3001"
    RFQ_HEDGE_LEASE_MS: "45000"
    RFQ_HEDGE_POLL_INTERVAL_MS: "250"
    RFQ_HEDGE_RETRY_DELAY_MS: "1000"
    RFQ_HEDGE_MAX_ORDER_AGE_MS: "30000"
    RFQ_BINANCE_RECV_WINDOW_MS: "5000"
  secret:
    name: rfq-hedge-worker-secrets
    databaseUrlKey: DATABASE_URL
    apiKeyKey: RFQ_BINANCE_API_KEY
    apiSecretKey: RFQ_BINANCE_API_SECRET
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3001"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  networkPolicy:
    enabled: true

analyticsWorker:
  enabled: true
  replicaCount: 2
  port: 3002
  env:
    RFQ_LOG_LEVEL: info
    RFQ_ANALYTICS_WORKER_HOST: "0.0.0.0"
    RFQ_ANALYTICS_WORKER_PORT: "3002"
    RFQ_ANALYTICS_KAFKA_BROKERS: "redpanda.example.internal:9093"
    RFQ_ANALYTICS_KAFKA_TOPIC: "rfq.analytics.v1"
    RFQ_ANALYTICS_KAFKA_CLIENT_ID: "rfq-analytics"
    RFQ_ANALYTICS_KAFKA_GROUP_ID: "rfq-clickhouse-v1"
    RFQ_ANALYTICS_KAFKA_SSL: "true"
    RFQ_ANALYTICS_KAFKA_SASL_MECHANISM: "scram-sha-256"
    RFQ_ANALYTICS_BATCH_SIZE: "10"
    RFQ_ANALYTICS_LEASE_MS: "120000"
    RFQ_ANALYTICS_POLL_INTERVAL_MS: "250"
    RFQ_ANALYTICS_RETRY_DELAY_MS: "1000"
    RFQ_ANALYTICS_OUTBOX_RETENTION_MS: "604800000"
    RFQ_CLICKHOUSE_URL: "https://clickhouse.example.internal:8443"
    RFQ_CLICKHOUSE_DATABASE: "rfq_analytics"
    RFQ_CLICKHOUSE_ANALYTICS_TABLE: "rfq_analytics_events"
    RFQ_CLICKHOUSE_REQUEST_TIMEOUT_MS: "10000"
  secret:
    name: rfq-analytics-worker-secrets
    databaseUrlKey: DATABASE_URL
    kafkaUsernameKey: RFQ_ANALYTICS_KAFKA_SASL_USERNAME
    kafkaPasswordKey: RFQ_ANALYTICS_KAFKA_SASL_PASSWORD
    clickhouseUsernameKey: RFQ_CLICKHOUSE_USERNAME
    clickhousePasswordKey: RFQ_CLICKHOUSE_PASSWORD
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3002"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 750m
      memory: 768Mi
  networkPolicy:
    enabled: true

reconciliationWorker:
  enabled: true
  replicaCount: 2
  port: 3003
  env:
    RFQ_LOG_LEVEL: info
    RFQ_RECONCILIATION_WORKER_HOST: "0.0.0.0"
    RFQ_RECONCILIATION_WORKER_PORT: "3003"
    RFQ_RECONCILIATION_LEASE_MS: "30000"
    RFQ_RECONCILIATION_POLL_INTERVAL_MS: "250"
    RFQ_RECONCILIATION_RETRY_DELAY_MS: "1000"
  secret:
    name: rfq-reconciliation-worker-secrets
    databaseUrlKey: DATABASE_URL
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3003"
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi
  networkPolicy:
    enabled: true

settlementIndexer:
  enabled: true
  replicaCount: 2
  port: 3004
  env:
    RFQ_LOG_LEVEL: info
    RFQ_SETTLEMENT_INDEXER_HOST: "0.0.0.0"
    RFQ_SETTLEMENT_INDEXER_PORT: "3004"
    RFQ_SETTLEMENT_INDEXER_LEASE_MS: "30000"
    RFQ_SETTLEMENT_INDEXER_POLL_INTERVAL_MS: "1000"
    RFQ_SETTLEMENT_INDEXER_READINESS_STALE_MS: "60000"
  secret:
    name: rfq-settlement-indexer-secrets
    databaseUrlKey: DATABASE_URL
    configJsonKey: RFQ_SETTLEMENT_INDEXER_CONFIG_JSON
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3004"
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi
  networkPolicy:
    enabled: true

toxicFlowAnalyzer:
  enabled: true
  replicaCount: 2
  port: 3005
  env:
    RFQ_LOG_LEVEL: info
    RFQ_TOXIC_FLOW_ANALYZER_HOST: "0.0.0.0"
    RFQ_TOXIC_FLOW_ANALYZER_PORT: "3005"
    RFQ_TOXIC_FLOW_ANALYZER_LEASE_MS: "30000"
    RFQ_TOXIC_FLOW_ANALYZER_POLL_INTERVAL_MS: "250"
    RFQ_TOXIC_FLOW_ANALYZER_RETRY_DELAY_MS: "1000"
    RFQ_TOXIC_FLOW_MARKOUT_HORIZON_SECONDS: "300"
    RFQ_TOXIC_FLOW_MARKOUT_MAX_SNAPSHOT_LAG_SECONDS: "900"
    RFQ_TOXIC_FLOW_SCORE_WINDOW_SECONDS: "86400"
    RFQ_TOXIC_FLOW_SCORE_SCALE: "100"
    RFQ_TOXIC_FLOW_ANALYZER_POLICY_VERSION: markout-v1
  secret:
    name: rfq-toxic-flow-analyzer-secrets
    databaseUrlKey: DATABASE_URL
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3005"
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi
  networkPolicy:
    enabled: true

