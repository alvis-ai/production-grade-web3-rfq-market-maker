replicaCount: 2
terminationGracePeriodSeconds: 30
preStopSleepSeconds: 5

image:
  repository: ghcr.io/example/rfq-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "3000"

env:
  NODE_ENV: production
  HOST: "0.0.0.0"
  PORT: "3000"
  RFQ_LOG_LEVEL: info
  RFQ_QUOTE_TTL_SECONDS: "30"
  RFQ_BODY_LIMIT_BYTES: "32768"
  RFQ_CORS_ALLOWED_ORIGINS: "https://app.example.com"
  RFQ_ENABLE_HSTS: "true"
  RFQ_TRUST_PROXY: "false"
  RFQ_RATE_LIMIT_BACKEND: redis
  RFQ_MARKET_DATA_PROVIDER: static
  RFQ_TOKEN_REGISTRY_JSON: '{"tokens":[{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000002","symbol":"TOKEN2","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true},{"chainId":1,"tokenAddress":"0x0000000000000000000000000000000000000003","symbol":"TOKEN3","decimals":18,"isWhitelisted":true,"riskTier":"low","usdReference":true}]}'
  RFQ_CEX_DEPTH_RANGE_BPS: "50"
  RFQ_CEX_FLUSH_INTERVAL_MS: "100"
  RFQ_CEX_VOLATILITY_SAMPLE_SIZE: "10"
  RFQ_CEX_MAX_SOURCE_AGE_MS: "2000"
  RFQ_CEX_MAX_FUTURE_SKEW_MS: "1000"
  RFQ_CEX_MIN_SOURCES: "2"
  RFQ_CEX_MAX_SOURCE_DEVIATION_BPS: "100"
  RFQ_CEX_MAX_SPREAD_BPS: "100"
  RFQ_ALLOW_SIMULATED_SETTLEMENT: "false"

signerSecret:
  name: rfq-backend-secrets
  privateKeyKey: RFQ_SIGNER_PRIVATE_KEY
  settlementAddressKey: RFQ_SETTLEMENT_ADDRESS

chainlinkConfigSecret:
  enabled: false
  name: rfq-backend-secrets
  key: RFQ_CHAINLINK_CONFIG_JSON

receiptConfigSecret:
  enabled: true
  name: rfq-backend-secrets
  key: RFQ_RECEIPT_CONFIG_JSON

redisSecret:
  name: rfq-backend-secrets
  urlKey: RFQ_REDIS_URL

databaseSecret:
  name: rfq-backend-secrets
  urlKey: DATABASE_URL

migrationSecret:
  name: rfq-database-migration-secrets
  urlKey: DATABASE_URL

hedgeWorker:
  enabled: true
  replicaCount: 2
  port: 3001
  env:
    RFQ_HEDGE_WORKER_HOST: "0.0.0.0"
    RFQ_HEDGE_WORKER_PORT: "3001"
    RFQ_HEDGE_LEASE_MS: "30000"
    RFQ_HEDGE_POLL_INTERVAL_MS: "250"
    RFQ_HEDGE_RETRY_DELAY_MS: "1000"
    RFQ_HEDGE_ROUTES_JSON: '{"routes":[{"chainId":1,"token":"0x0000000000000000000000000000000000000003","venue":"binance","symbol":"ETHUSDT","tokenDecimals":18,"stepSizeRaw":"100000000000000"}]}'
    RFQ_BINANCE_BASE_URL: "https://api.binance.com"
    RFQ_BINANCE_RECV_WINDOW_MS: "5000"
    RFQ_BINANCE_REQUEST_TIMEOUT_MS: "10000"
  secret:
    name: rfq-hedge-worker-secrets
    databaseUrlKey: DATABASE_URL
    apiKeyKey: RFQ_BINANCE_API_KEY
    apiSecretKey: RFQ_BINANCE_API_SECRET
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3001"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  networkPolicy:
    enabled: true

analyticsWorker:
  enabled: true
  replicaCount: 2
  port: 3002
  env:
    RFQ_ANALYTICS_WORKER_HOST: "0.0.0.0"
    RFQ_ANALYTICS_WORKER_PORT: "3002"
    RFQ_ANALYTICS_KAFKA_BROKERS: "redpanda.example.internal:9093"
    RFQ_ANALYTICS_KAFKA_TOPIC: "rfq.analytics.v1"
    RFQ_ANALYTICS_KAFKA_CLIENT_ID: "rfq-analytics"
    RFQ_ANALYTICS_KAFKA_GROUP_ID: "rfq-clickhouse-v1"
    RFQ_ANALYTICS_KAFKA_SSL: "true"
    RFQ_ANALYTICS_KAFKA_SASL_MECHANISM: "scram-sha-256"
    RFQ_ANALYTICS_BATCH_SIZE: "10"
    RFQ_ANALYTICS_LEASE_MS: "120000"
    RFQ_ANALYTICS_POLL_INTERVAL_MS: "250"
    RFQ_ANALYTICS_RETRY_DELAY_MS: "1000"
    RFQ_ANALYTICS_OUTBOX_RETENTION_MS: "604800000"
    RFQ_CLICKHOUSE_URL: "https://clickhouse.example.internal:8443"
    RFQ_CLICKHOUSE_DATABASE: "rfq_analytics"
    RFQ_CLICKHOUSE_ANALYTICS_TABLE: "rfq_analytics_events"
    RFQ_CLICKHOUSE_REQUEST_TIMEOUT_MS: "10000"
  secret:
    name: rfq-analytics-worker-secrets
    databaseUrlKey: DATABASE_URL
    kafkaUsernameKey: RFQ_ANALYTICS_KAFKA_SASL_USERNAME
    kafkaPasswordKey: RFQ_ANALYTICS_KAFKA_SASL_PASSWORD
    clickhouseUsernameKey: RFQ_CLICKHOUSE_USERNAME
    clickhousePasswordKey: RFQ_CLICKHOUSE_PASSWORD
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3002"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 750m
      memory: 768Mi
  networkPolicy:
    enabled: true

reconciliationWorker:
  enabled: true
  replicaCount: 2
  port: 3003
  env:
    RFQ_RECONCILIATION_WORKER_HOST: "0.0.0.0"
    RFQ_RECONCILIATION_WORKER_PORT: "3003"
    RFQ_RECONCILIATION_LEASE_MS: "30000"
    RFQ_RECONCILIATION_POLL_INTERVAL_MS: "250"
    RFQ_RECONCILIATION_RETRY_DELAY_MS: "1000"
  secret:
    name: rfq-reconciliation-worker-secrets
    databaseUrlKey: DATABASE_URL
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3003"
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi
  networkPolicy:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
