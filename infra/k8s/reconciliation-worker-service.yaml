apiVersion: v1
kind: Service
metadata:
  name: rfq-reconciliation-worker
  namespace: rfq-market-maker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "3003"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rfq-reconciliation-worker
  ports:
    - name: http
      port: 3003
      targetPort: http
