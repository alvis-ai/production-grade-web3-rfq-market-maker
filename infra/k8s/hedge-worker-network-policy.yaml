apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rfq-hedge-worker
  namespace: rfq-market-maker
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rfq-hedge-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3001
  egress: []
