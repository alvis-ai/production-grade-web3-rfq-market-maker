apiVersion: v1
kind: Secret
metadata:
  name: rfq-signer-secrets
  namespace: rfq-market-maker
type: Opaque
stringData:
  RFQ_AWS_KMS_KEY_ID: alias/replace-with-production-kms-key
  RFQ_SIGNER_SERVICE_TOKEN: replace-with-43-character-url-safe-signer-service-token
  RFQ_TRUSTED_SIGNER_ADDRESS: replace-with-kms-signer-address
  RFQ_SETTLEMENT_ADDRESS: replace-with-rfq-settlement-address
  RFQ_SIGNER_AUDIT_DATABASE_URL: postgres://rfq_signer_audit:replace-with-password@postgres.example.com:5432/rfq_market_maker?minPool=1&maxPool=3&sslmode=verify-full&sslrootcert=%2Fetc%2Frfq-signer-database-ca%2Fca.crt
  tls.crt: |
    replace-with-signer-service-certificate
  tls.key: |
    replace-with-signer-service-private-key
  database-ca.crt: |
    replace-with-postgres-ca-certificate
