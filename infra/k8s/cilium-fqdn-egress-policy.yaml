apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rfq-backend-fqdn-egress
  namespace: rfq-market-maker
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rfq-backend
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: postgres.example.com
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toFQDNs:
        - matchName: redis.example.com
      toPorts:
        - ports:
            - port: "6380"
              protocol: TCP
    - toFQDNs:
        - matchName: api.binance.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchName: stream.binance.com
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
    - toFQDNs:
        - matchName: ws-feed.exchange.coinbase.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchName: replace-with-production-rpc.example.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
