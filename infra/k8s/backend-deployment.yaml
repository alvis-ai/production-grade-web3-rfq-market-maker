apiVersion: apps/v1
kind: Deployment
metadata:
  name: rfq-backend
  namespace: rfq-market-maker
  labels:
    app.kubernetes.io/name: rfq-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rfq-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rfq-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/rfq-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: rfq-backend-config
            - secretRef:
                name: rfq-backend-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
