apiVersion: v1
kind: Secret
metadata:
  name: rfq-analytics-worker-secrets
  namespace: rfq-market-maker
type: Opaque
stringData:
  DATABASE_URL: replace-with-analytics-runtime-database-url
  RFQ_ANALYTICS_KAFKA_SASL_USERNAME: replace-with-kafka-username
  RFQ_ANALYTICS_KAFKA_SASL_PASSWORD: replace-with-kafka-password
  RFQ_CLICKHOUSE_USERNAME: replace-with-clickhouse-username
  RFQ_CLICKHOUSE_PASSWORD: replace-with-clickhouse-password
