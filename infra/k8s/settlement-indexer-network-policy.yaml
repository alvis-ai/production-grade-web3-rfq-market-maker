apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rfq-settlement-indexer
  namespace: rfq-market-maker
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rfq-settlement-indexer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3004
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 5432
    - ports:
        - protocol: TCP
          port: 443
