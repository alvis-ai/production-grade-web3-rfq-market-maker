apiVersion: v1
kind: Secret
metadata:
  name: rfq-settlement-indexer-secrets
  namespace: rfq-market-maker
type: Opaque
stringData:
  DATABASE_URL: postgres://indexer:replace-with-password@postgres.example.com:5432/rfq_market_maker
  RFQ_SETTLEMENT_INDEXER_CONFIG_JSON: '{"chains":[{"chainId":1,"rpcUrl":"https://replace-with-production-rpc.example.com","settlementAddress":"0x0000000000000000000000000000000000000000","startBlock":0,"confirmations":12,"maxBlockRange":500,"reorgLookbackBlocks":5000,"requestTimeoutMs":10000}]}'
