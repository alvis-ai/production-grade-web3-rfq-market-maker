apiVersion: v1
kind: Secret
metadata:
  name: rfq-backend-secrets
  namespace: rfq-market-maker
type: Opaque
stringData:
  RFQ_SIGNER_PRIVATE_KEY: replace-with-production-signer-private-key
  RFQ_SETTLEMENT_ADDRESS: replace-with-rfq-settlement-address
  RFQ_REDIS_URL: redis://replace-with-redis-service:6379/0
  RFQ_RECEIPT_CONFIG_JSON: '{"chains":[{"chainId":1,"rpcUrl":"https://replace-with-production-rpc.example.com","settlementAddress":"0x0000000000000000000000000000000000000004","confirmations":2,"receiptTimeoutMs":120000}]}'
