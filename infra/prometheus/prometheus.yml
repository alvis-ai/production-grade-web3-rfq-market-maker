global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/rfq-alerts.yml

scrape_configs:
  - job_name: rfq-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3000

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
