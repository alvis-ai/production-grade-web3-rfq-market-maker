global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/rfq-alerts.yml

scrape_configs:
  - job_name: rfq-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3000

  - job_name: rfq-hedge-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - hedge-worker:3001

  - job_name: rfq-analytics-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - analytics-worker:3002

  - job_name: rfq-reconciliation-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - reconciliation-worker:3003

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
