groups:
  - name: rfq-core
    rules:
      - alert: RFQBackendDown
        expr: up{job="rfq-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ backend metrics endpoint is down
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQApiHpaAtMaximum
        expr: max(kube_horizontalpodautoscaler_status_desired_replicas{namespace="rfq-market-maker"}) >= max(kube_horizontalpodautoscaler_spec_max_replicas{namespace="rfq-market-maker"})
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ API HPA has remained at its maximum replica count
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQApiHpaMetricsUnavailable
        expr: max(kube_horizontalpodautoscaler_status_condition{namespace="rfq-market-maker",condition="ScalingActive",status="false"}) == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ API HPA cannot calculate replicas from resource metrics
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQWorkloadDisruptionBudgetBlocked
        expr: min by (poddisruptionbudget) (kube_poddisruptionbudget_status_pod_disruptions_allowed{namespace="rfq-market-maker"}) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: An RFQ workload disruption budget has no eviction capacity
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQPodsUnschedulable
        expr: sum(kube_pod_status_unschedulable{namespace="rfq-market-maker"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ Pods cannot satisfy topology, resource, taint, or affinity constraints
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteTrafficStopped
        expr: increase(rfq_quote_requests_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote request counter has not increased
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteErrorsSpike
        expr: increase(rfq_quote_errors_total[5m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote error volume is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteResponsesStalled
        expr: increase(rfq_quote_requests_total[10m]) > 0 and increase(rfq_quote_responses_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote requests are not producing signed quote responses
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteCreationPaused
        expr: max(rfq_quote_paused) == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ API quote creation is administratively paused
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuotePairsPaused
        expr: max(rfq_quote_pairs_paused) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: One or more RFQ chain and token pairs are administratively paused
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteControlChanged
        expr: sum(increase(rfq_quote_control_updates_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ administrative quote-control state changed
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteControlErrors
        expr: sum by (operation) (increase(rfq_quote_control_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ quote-control read or update operations are failing
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowScoreChanged
        expr: sum(increase(rfq_toxic_flow_score_updates_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ dynamic toxic-flow score state changed
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowScoreErrors
        expr: sum by (operation) (increase(rfq_toxic_flow_score_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ toxic-flow score read or update operations are failing
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitTrafficSpike
        expr: increase(rfq_submit_requests_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ submit request volume is above skeleton threshold
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitErrorsSpike
        expr: increase(rfq_submit_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ submit error volume is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitLatencyP95High
        expr: histogram_quantile(0.95, rate(rfq_submit_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ submit p95 latency is above 2 seconds
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitReservationErrors
        expr: sum(increase(rfq_submit_reservation_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ submit reservation persistence errors detected
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitReservationContentionSpike
        expr: increase(rfq_submit_reservation_contention_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote submit reservation contention is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQRateLimitSpike
        expr: sum by (endpoint) (increase(rfq_rate_limited_total[5m])) > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ rate-limited request volume is elevated by endpoint group
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQApiAuthRejectionsSpike
        expr: sum by (reason) (increase(rfq_api_auth_rejections_total[5m])) > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ API authentication or scope rejections are elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteLatencyP95High
        expr: histogram_quantile(0.95, rate(rfq_quote_latency_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote p95 latency is above 1 second
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteRiskRejectSpike
        expr: sum(increase(rfq_quote_rejections_total[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote risk rejection volume is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQTreasuryLiquidityInsufficient
        expr: sum(increase(rfq_quote_rejections_total{reason="TREASURY_LIQUIDITY_INSUFFICIENT"}[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ treasury output liquidity is insufficient for requested quotes
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQPortfolioVarLimitExceeded
        expr: sum(increase(rfq_quote_rejections_total{reason="PORTFOLIO_VAR_LIMIT_EXCEEDED"}[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ portfolio VaR budget is exhausted
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQRiskDependencyUnavailable
        expr: sum(increase(rfq_quote_rejections_total{reason="RISK_ENGINE_UNAVAILABLE"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ pre-sign risk or treasury evidence dependency is unavailable
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSignerErrors
        expr: sum(increase(rfq_signer_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ signer operation errors detected
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSignerSignThroughputStalled
        expr: increase(rfq_quote_requests_total[10m]) > 0 and sum(increase(rfq_signer_requests_total{operation="sign"}[10m])) == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: RFQ quote traffic is not reaching signer sign operations
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSignerLatencyP95High
        expr: histogram_quantile(0.95, sum by (le, operation) (rate(rfq_signer_latency_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ signer p95 latency is above 500ms
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQMarketDataCacheCold
        expr: increase(rfq_market_data_cache_misses_total[10m]) > 0 and increase(rfq_market_data_cache_hits_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ market data cache is not producing quote-path hits
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQCexOrderBookUnavailable
        expr: (sum(rfq_cex_order_book_sources) > 0 and sum(rfq_cex_order_book_sources{state="ready"}) == 0) or max(rfq_cex_order_book_max_update_age_seconds) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ CEX order-book sources are unavailable or stale
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQCexOrderBookPairBlocked
        expr: sum(rfq_cex_order_book_pairs{state="blocked"}) > 0 or max(rfq_cex_order_book_deviation_rejected_sources) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ CEX order-book quorum or deviation guard is blocking pairs
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQCexOrderBookConnectorErrors
        expr: sum(increase(rfq_cex_order_book_connector_errors_total[10m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ CEX order-book connectors are repeatedly resynchronizing
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQReadinessDegraded
        expr: rfq_readiness_status{status="degraded"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ readiness probe reports degraded dependencies
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQDependencyComponentDegraded
        expr: rfq_dependency_status{status="degraded"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ readiness dependency component is degraded
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeIntentErrors
        expr: sum(increase(rfq_hedge_intent_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ hedge intent creation errors detected after settlement
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeIntentThroughputStalled
        expr: increase(rfq_settlements_total[10m]) > 0 and increase(rfq_hedge_intents_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ settlements are not producing hedge intents
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementThroughputStalled
        expr: increase(rfq_submit_accepted_total[10m]) > 0 and increase(rfq_settlements_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ accepted submits are not producing new settlement events
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeLagHigh
        expr: histogram_quantile(0.95, rate(rfq_hedge_lag_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ hedge p95 lag is above 2 seconds
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeWorkerIterationErrors
        expr: increase(rfq_hedge_worker_iteration_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ hedge worker cannot complete polling iterations
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeWorkerRetries
        expr: sum(increase(rfq_hedge_worker_jobs_total{status="retry_scheduled"}[10m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ hedge worker is repeatedly rescheduling CEX execution
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeWorkerProcessingStalled
        expr: increase(rfq_hedge_intents_total[10m]) > 0 and (time() - max(rfq_hedge_worker_last_processed_timestamp_seconds)) > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ hedge intents are arriving without worker progress
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeFeeBacklog
        expr: max(rfq_hedge_fee_pending) > 100 or max(rfq_hedge_fee_oldest_due_age_seconds) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ exact CEX fee evidence backlog is elevated or stale
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeFeeRetries
        expr: sum(increase(rfq_hedge_fee_reconciliations_total{status="retry_scheduled"}[10m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ CEX fee evidence reconciliation is repeatedly retrying
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeFeeIterationErrors
        expr: increase(rfq_hedge_fee_iteration_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ fee worker cannot complete polling iterations
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeFeeProcessingStalled
        expr: max(rfq_hedge_fee_pending) > 0 and (time() - max(rfq_hedge_fee_last_processed_timestamp_seconds)) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ fee evidence remains pending without reconciliation progress
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQInventoryExposureHigh
        expr: max by (chain_id, token) (abs(rfq_inventory_balance)) > 1000000000000000000000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ simulated inventory balance exceeds skeleton exposure threshold
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteStatusUpdateErrors
        expr: sum(increase(rfq_quote_status_update_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote status persistence errors detected after settlement
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQPnlRecordErrors
        expr: sum(increase(rfq_pnl_record_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ PnL attribution record errors detected after settlement
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQPnlThroughputStalled
        expr: increase(rfq_settlements_total[10m]) > 0 and increase(rfq_pnl_trades_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ settlements are not producing realized PnL trades
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQRealizedPnlNegative
        expr: min by (chain_id, token) (rfq_realized_pnl_token_out) < 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ realized spread PnL is negative by output token
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQAnalyticsWorkerDown
        expr: up{job="rfq-analytics-worker"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ analytics worker metrics endpoint is down
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQAnalyticsOutboxBacklog
        expr: max(rfq_analytics_outbox_pending) > 100 or max(rfq_analytics_outbox_oldest_age_seconds) > 300 or (max(rfq_analytics_outbox_pending) > 0 and (time() - max(rfq_analytics_last_published_timestamp_seconds)) > 300)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ analytics outbox is accumulating unpublished events
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQAnalyticsPublishRetries
        expr: sum(increase(rfq_analytics_outbox_retries_total[10m])) > 5 or sum(increase(rfq_analytics_publisher_iteration_errors_total[10m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ analytics publisher is repeatedly retrying Redpanda writes
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQAnalyticsConsumerErrors
        expr: sum(increase(rfq_analytics_consumer_errors_total[10m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ analytics events cannot be projected into ClickHouse
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQAnalyticsProjectionStalled
        expr: sum(increase(rfq_analytics_outbox_published_total[10m])) > 0 and sum(increase(rfq_analytics_clickhouse_events_total[10m])) == 0 and (time() - max(rfq_analytics_last_consumed_timestamp_seconds)) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ analytics events are published but ClickHouse projection is stalled
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQAnalyticsOutboxCleanupStalled
        expr: max(rfq_analytics_outbox_cleanup_eligible) > 0 and sum(increase(rfq_analytics_outbox_deleted_total[1h])) == 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: RFQ published analytics outbox retention cleanup is not progressing
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQReconciliationWorkerDown
        expr: up{job="rfq-reconciliation-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ post-trade reconciliation worker is down
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQReconciliationBacklog
        expr: max(rfq_reconciliation_pending_jobs) > 100 or max(rfq_reconciliation_oldest_pending_age_seconds) > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ post-trade projections are not converging
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQReconciliationRetries
        expr: sum(increase(rfq_reconciliation_jobs_total{outcome="retry_scheduled"}[10m])) > 5 or sum(increase(rfq_reconciliation_iteration_errors_total[10m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ post-trade reconciliation is repeatedly retrying
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQReconciliationProcessingStalled
        expr: max(rfq_reconciliation_pending_jobs) > 0 and (time() - max(rfq_reconciliation_last_processed_timestamp_seconds)) > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ post-trade reconciliation has pending work without progress
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerDown
        expr: up{job="rfq-settlement-indexer"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ settlement indexer metrics endpoint is down
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerLagHigh
        expr: max(rfq_settlement_indexer_lag_blocks) > 50
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Confirmed QuoteSettled blocks are not being indexed
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerErrors
        expr: sum(increase(rfq_settlement_indexer_errors_total[10m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ settlement indexer is rejecting chain or storage input
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerDeepReorg
        expr: sum(increase(rfq_settlement_indexer_errors_total{code="DEEP_REORG"}[10m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ settlement chain reorg exceeds the automatic rollback window
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerProgressStalled
        expr: (max(rfq_settlement_indexer_safe_head - rfq_settlement_indexer_next_block + 1) > 0 and sum(increase(rfq_settlement_indexer_ranges_total[10m])) == 0) or (time() - max(rfq_settlement_indexer_last_poll_timestamp_seconds)) > 120 or max(rfq_settlement_indexer_cursor_update_age_seconds) > 120
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ settlement indexer cursor or polling progress is stale
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerDuplicateStorm
        expr: sum(increase(rfq_settlement_indexer_events_total{outcome="duplicate"}[10m])) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ settlement ingestion is receiving excessive duplicate evidence
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementIndexerReorgDetected
        expr: sum(increase(rfq_settlement_indexer_reorgs_total[10m])) > 0 or sum(increase(rfq_settlement_indexer_reorg_removed_events_total[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ settlement indexer rolled back confirmed history
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowAnalyzerDown
        expr: up{job="rfq-toxic-flow-analyzer"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ toxic-flow analyzer metrics endpoint is down
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowMarkoutBacklog
        expr: max(rfq_toxic_flow_markout_pending) > 100 or max(rfq_toxic_flow_markout_oldest_eligible_age_seconds) > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ post-trade markout jobs are not converging
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowAnalyzerRetries
        expr: sum(increase(rfq_toxic_flow_markouts_total{outcome="retry_scheduled"}[10m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ toxic-flow analyzer repeatedly cannot publish markouts
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowAnalyzerErrors
        expr: sum(increase(rfq_toxic_flow_analyzer_iteration_errors_total[10m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: RFQ toxic-flow analyzer loop is failing outside claimed jobs
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQToxicFlowAnalyzerProcessingStalled
        expr: max(rfq_toxic_flow_markout_pending) > 0 and (time() - max(rfq_toxic_flow_analyzer_last_processed_timestamp_seconds)) > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: RFQ toxic-flow analyzer has pending jobs without progress
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md
