groups:
  - name: rfq-core
    rules:
      - alert: RFQBackendDown
        expr: up{job="rfq-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ backend metrics endpoint is down
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteTrafficStopped
        expr: increase(rfq_quote_requests_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote request counter has not increased
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteErrorsSpike
        expr: increase(rfq_quote_errors_total[5m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote error volume is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteResponsesStalled
        expr: increase(rfq_quote_requests_total[10m]) > 0 and increase(rfq_quote_responses_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote requests are not producing signed quote responses
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitTrafficSpike
        expr: increase(rfq_submit_requests_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ submit request volume is above skeleton threshold
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitErrorsSpike
        expr: increase(rfq_submit_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ submit error volume is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSubmitLatencyP95High
        expr: histogram_quantile(0.95, rate(rfq_submit_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ submit p95 latency is above 2 seconds
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQRateLimitSpike
        expr: sum by (endpoint) (increase(rfq_rate_limited_total[5m])) > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ rate-limited request volume is elevated by endpoint group
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteLatencyP95High
        expr: histogram_quantile(0.95, rate(rfq_quote_latency_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote p95 latency is above 1 second
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteRiskRejectSpike
        expr: sum(increase(rfq_quote_rejections_total[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote risk rejection volume is elevated
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSignerErrors
        expr: sum(increase(rfq_signer_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RFQ signer operation errors detected
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSignerLatencyP95High
        expr: histogram_quantile(0.95, sum by (le, operation) (rate(rfq_signer_latency_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ signer p95 latency is above 500ms
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQReadinessDegraded
        expr: rfq_readiness_status{status="degraded"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RFQ readiness probe reports degraded dependencies
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeIntentErrors
        expr: sum(increase(rfq_hedge_intent_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ hedge intent creation errors detected after settlement
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeIntentThroughputStalled
        expr: increase(rfq_settlements_total[10m]) > 0 and increase(rfq_hedge_intents_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ settlements are not producing hedge intents
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQSettlementThroughputStalled
        expr: increase(rfq_submit_accepted_total[10m]) > 0 and increase(rfq_settlements_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RFQ accepted submits are not producing new settlement events
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQHedgeLagHigh
        expr: histogram_quantile(0.95, rate(rfq_hedge_lag_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ hedge p95 lag is above 2 seconds
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQInventoryExposureHigh
        expr: max by (chain_id, token) (abs(rfq_inventory_balance)) > 1000000000000000000000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ simulated inventory balance exceeds skeleton exposure threshold
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQQuoteStatusUpdateErrors
        expr: sum(increase(rfq_quote_status_update_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ quote status persistence errors detected after settlement
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQPnlRecordErrors
        expr: sum(increase(rfq_pnl_record_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: RFQ PnL attribution record errors detected after settlement
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md

      - alert: RFQRealizedPnlNegative
        expr: min by (chain_id, token) (rfq_realized_pnl_token_out) < 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RFQ realized spread PnL is negative by output token
          runbook: book/Volume7-ProductionDeployment/Chapter05-Runbook.md
