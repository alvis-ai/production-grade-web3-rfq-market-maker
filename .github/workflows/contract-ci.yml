name: Contract CI

on:
  pull_request:
    paths:
      - "contracts/**"
      - "backend/src/modules/signer/signer.service.ts"
      - "backend/src/modules/settlement/settlement-verifier.service.ts"
      - "backend/src/modules/settlement/postgres-settlement-event.store.ts"
      - "backend/src/modules/indexer/**"
      - "backend/src/modules/execution/**"
      - "backend/src/modules/hedge/**"
      - "backend/src/modules/inventory/**"
      - "backend/src/modules/reconciliation/**"
      - "backend/src/runtime/gateway-application.ts"
      - "backend/src/runtime/gateway-runtime.ts"
      - "backend/src/runtime/market-runtime.ts"
      - "backend/src/hedge-worker-main.ts"
      - "backend/test/gateway-settlement-policy.test.mjs"
      - "backend/test/execution*.test.mjs"
      - "backend/test/market-runtime.test.mjs"
      - "backend/test/*settlement-indexer*"
      - "backend/test/*reconciliation*"
      - "sdk/src/abi.ts"
      - "sdk/src/eip712.ts"
      - "scripts/settlement-e2e.mjs"
      - "scripts/settlement-indexer-e2e.mjs"
      - "scripts/settlement-e2e.sh"
      - "scripts/contract-deployment-integration-check.mjs"
      - "scripts/contract-deployment-integration-check.test.mjs"
      - "scripts/fixtures/contract-deployment-live-rpc.mjs"
      - "scripts/fixtures/binance-testnet-live-api.mjs"
      - "scripts/check-contract-abi-consistency.mjs"
      - "scripts/check-eip712-consistency.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".gitmodules"
      - "Makefile"
      - ".github/workflows/contract-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rfq_market_maker
          POSTGRES_USER: rfq
          POSTGRES_PASSWORD: rfq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfq -d rfq_market_maker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false
      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: stable
      - name: Install workspace dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Check formatting
        working-directory: contracts
        run: forge fmt --check
      - name: Check EIP-712 schema consistency
        run: make eip712-check
      - name: Check contract ABI consistency
        run: make contract-abi-check
      - name: Build contracts
        working-directory: contracts
        run: forge build
      - name: Test contracts
        working-directory: contracts
        run: forge test
      - name: Test target-chain deployment verification
        run: make contract-deployment-check
      - name: Test receipt-confirmed settlement end to end
        run: make settlement-e2e
      - name: Test settlement, hedge execution, and reorg recovery
        env:
          NODE_ENV: test
          DATABASE_URL: "postgres://rfq:rfq@127.0.0.1:5432/rfq_market_maker?minPool=2&maxPool=10"
          RFQ_SETTLEMENT_INDEXER_E2E_CONFIRM: "yes"
        run: make db-migrate settlement-indexer-e2e
