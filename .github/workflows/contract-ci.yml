name: Contract CI

on:
  pull_request:
    paths:
      - "contracts/**"
      - "backend/src/modules/signer/signer.service.ts"
      - "sdk/src/abi.ts"
      - "sdk/src/eip712.ts"
      - "scripts/check-contract-abi-consistency.mjs"
      - "scripts/check-eip712-consistency.mjs"
      - ".gitmodules"
      - "Makefile"
      - ".github/workflows/contract-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  contracts:
    runs-on: ubuntu-latest
    env:
      FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Check formatting
        working-directory: contracts
        run: forge fmt --check
      - name: Check EIP-712 schema consistency
        run: make eip712-check
      - name: Check contract ABI consistency
        run: make contract-abi-check
      - name: Build contracts
        working-directory: contracts
        run: forge build
      - name: Test contracts
        working-directory: contracts
        run: forge test
