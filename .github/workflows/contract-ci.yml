name: Contract CI

on:
  pull_request:
    paths:
      - "contracts/**"
      - "backend/src/modules/signer/signer.service.ts"
      - "sdk/src/abi.ts"
      - "sdk/src/eip712.ts"
      - "scripts/check-contract-abi-consistency.mjs"
      - "scripts/check-eip712-consistency.mjs"
      - ".gitmodules"
      - "Makefile"
      - ".github/workflows/contract-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false
      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: stable
      - name: Check formatting
        working-directory: contracts
        run: forge fmt --check
      - name: Check EIP-712 schema consistency
        run: make eip712-check
      - name: Check contract ABI consistency
        run: make contract-abi-check
      - name: Build contracts
        working-directory: contracts
        run: forge build
      - name: Test contracts
        working-directory: contracts
        run: forge test
