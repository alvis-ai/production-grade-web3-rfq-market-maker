name: Analytics CI

on:
  pull_request:
    paths:
      - "backend/src/analytics-worker-main.ts"
      - "backend/src/modules/analytics/**"
      - "backend/src/db/**"
      - "backend/test/analytics*.test.mjs"
      - "backend/test/clickhouse-analytics-sink.test.mjs"
      - "backend/test/kafka-analytics-consumer.test.mjs"
      - "backend/test/kafka-analytics-producer.test.mjs"
      - "backend/test/postgres-analytics-outbox-store.test.mjs"
      - "scripts/analytics-integration-check.mjs"
      - "scripts/analytics-e2e.sh"
      - "scripts/check-analytics-integration-consistency.mjs"
      - "docker-compose.yml"
      - "Makefile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/analytics-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install workspace dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Build backend before analytics dependencies
        timeout-minutes: 2
        run: pnpm --dir backend build
      - name: Start PostgreSQL, Redpanda, and ClickHouse
        run: |
          docker compose up -d --wait postgres redpanda clickhouse
          docker compose --profile analytics run --rm redpanda-topic-init
      - name: Apply database migrations
        timeout-minutes: 2
        env:
          NODE_ENV: test
          DATABASE_URL: "postgres://rfq:rfq@127.0.0.1:5432/rfq_market_maker?minPool=2&maxPool=8"
          RFQ_MIGRATION_TIMEOUT_MS: "60000"
        run: pnpm --dir backend exec node dist/db/migrate.js
      - name: Verify transactional analytics delivery
        timeout-minutes: 5
        env:
          NODE_ENV: test
          DATABASE_URL: "postgres://rfq:rfq@127.0.0.1:5432/rfq_market_maker?minPool=2&maxPool=8"
          RFQ_ANALYTICS_KAFKA_BROKERS: 127.0.0.1:19092
          RFQ_ANALYTICS_KAFKA_TOPIC: rfq.analytics.v1
          RFQ_ANALYTICS_KAFKA_CLIENT_ID: rfq-analytics-ci
          RFQ_ANALYTICS_KAFKA_GROUP_ID: rfq-clickhouse-ci
          RFQ_ANALYTICS_KAFKA_SSL: "false"
          RFQ_ANALYTICS_WORKER_HOST: 127.0.0.1
          RFQ_ANALYTICS_WORKER_PORT: "13002"
          RFQ_ANALYTICS_E2E_TIMEOUT_SECONDS: "120"
          RFQ_ANALYTICS_E2E_READY_REQUEST_TIMEOUT_MS: "1000"
          RFQ_ANALYTICS_INTEGRATION_TIMEOUT_MS: "60000"
          RFQ_ANALYTICS_INTEGRATION_REQUEST_TIMEOUT_MS: "5000"
          RFQ_ANALYTICS_BATCH_SIZE: "10"
          RFQ_ANALYTICS_LEASE_MS: "120000"
          RFQ_CLICKHOUSE_URL: http://127.0.0.1:8123
          RFQ_CLICKHOUSE_USERNAME: default
          RFQ_CLICKHOUSE_PASSWORD: rfq-clickhouse-dev
          RFQ_CLICKHOUSE_DATABASE: default
          RFQ_CLICKHOUSE_ANALYTICS_TABLE: rfq_analytics_events
          RFQ_ANALYTICS_INTEGRATION_CONFIRM: "yes"
        run: sh scripts/analytics-e2e.sh
      - name: Print analytics diagnostics
        if: failure()
        run: |
          test ! -f tmp/analytics-e2e-worker.log || cat tmp/analytics-e2e-worker.log
          docker compose logs --no-color postgres redpanda clickhouse
      - name: Stop analytics dependencies
        if: always()
        run: docker compose --profile analytics down --volumes
