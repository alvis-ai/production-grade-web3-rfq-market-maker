name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "benchmark/**"
      - "frontend/**"
      - "sdk/**"
      - "infra/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Makefile"
      - "scripts/**"
      - "docker-compose.yml"
      - ".env.example"
      - "README.md"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  typescript:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rfq_market_maker
          POSTGRES_USER: rfq
          POSTGRES_PASSWORD: rfq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfq -d rfq_market_maker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run repository quality gate
        run: make verify
      - name: Verify PostgreSQL quote exposure concurrency
        env:
          NODE_ENV: test
          DATABASE_URL: "postgres://rfq:rfq@127.0.0.1:5432/rfq_market_maker?minPool=2&maxPool=10"
          RFQ_QUOTE_EXPOSURE_INTEGRATION_CONFIRM: "yes"
        run: make db-migrate quote-exposure-integration-check
      - name: Verify Redis quote exposure authority and PostgreSQL mirror
        env:
          NODE_ENV: test
          DATABASE_URL: "postgres://rfq:rfq@127.0.0.1:5432/rfq_market_maker?minPool=2&maxPool=10"
          RFQ_QUOTE_EXPOSURE_REDIS_URL: "redis://127.0.0.1:6379/0"
          RFQ_QUOTE_EXPOSURE_REQUIRE_AOF: "false"
          RFQ_QUOTE_EXPOSURE_REDIS_INTEGRATION_CONFIRM: "yes"
          RFQ_QUOTE_EXPOSURE_LEDGER_INTEGRATION_CONFIRM: "yes"
        run: make quote-exposure-redis-integration-check quote-exposure-ledger-integration-check
      - name: Verify production hedge execution end to end
        env:
          NODE_ENV: test
          DATABASE_URL: "postgres://rfq:rfq@127.0.0.1:5432/rfq_market_maker?minPool=2&maxPool=10"
          RFQ_HEDGE_WORKER_E2E_CONFIRM: "yes"
        run: make hedge-worker-e2e
