name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "sdk/**"
      - "infra/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Makefile"
      - "scripts/**"
      - "docker-compose.yml"
      - ".env.example"
      - "README.md"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run repository quality gate
        run: make verify
