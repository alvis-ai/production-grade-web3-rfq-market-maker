name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "sdk/**"
      - "infra/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "Makefile"
      - "scripts/**"
      - "docker-compose.yml"
      - ".env.example"
      - "README.md"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Check repository skeleton
        run: make skeleton-check
      - name: Check EIP-712 schema consistency
        run: make eip712-check
      - name: Typecheck backend
        run: make backend-typecheck
      - name: Test backend
        run: make backend-test
      - name: Typecheck SDK
        run: make sdk-typecheck
      - name: Test SDK
        run: make sdk-test
      - name: Build frontend
        run: make frontend-build
      - name: Smoke API
        run: make smoke-api-local
