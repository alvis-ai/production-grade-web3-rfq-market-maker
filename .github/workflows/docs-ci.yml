name: Docs CI

on:
  pull_request:
    paths:
      - "book/**"
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repository skeleton
        run: make skeleton-check
      - name: Check documentation coverage
        run: make docs-check
