name: Docs CI

on:
  pull_request:
    paths:
      - "book/**"
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required first-batch documents
        run: |
          test -s README.md
          test -s book/Volume1-SystemArchitecture/Chapter01-Why-RFQ.md
          test -s docs/adr/ADR-0001-Use-RFQ-Instead-Of-AMM.md
          test -s docs/diagrams/system-overview.md
          test -s docs/diagrams/quote-sequence.md
          test -s docs/interview/rfq-questions.md
