openapi: 3.1.0
info:
  title: Production-Grade Web3 RFQ Market Maker API
  version: 0.1.0
  description: API draft for RFQ quote, submit, health, and metrics flows. Every response includes an x-trace-id header for request correlation; structured error bodies also include the same traceId value.
servers:
  - url: http://localhost:3000
paths:
  /quote:
    post:
      operationId: createQuote
      summary: Request an RFQ quote
      tags:
        - Quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
            examples:
              default:
                value:
                  chainId: 1
                  user: "0x0000000000000000000000000000000000000001"
                  tokenIn: "0x0000000000000000000000000000000000000002"
                  tokenOut: "0x0000000000000000000000000000000000000003"
                  amountIn: "1000000000"
                  slippageBps: 50
      responses:
        "200":
          description: Signed quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
              examples:
                default:
                  value:
                    quoteId: "q_1893456000000_1"
                    snapshotId: "snapshot_1_00000000_00000000"
                    amountOut: "998400000"
                    minAmountOut: "993408000"
                    deadline: 1893456030
                    nonce: "1893456000000001"
                    signature: "0x1111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Risk rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Market data unavailable, stale, invalid, routing unavailable, quote store unavailable, signer unavailable, or another quote dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /submit:
    post:
      operationId: submitQuote
      summary: Submit a signed quote through the backend relay or simulated settlement path
      description: >
        The first runnable skeleton applies a simulated settlement, updates inventory,
        attempts to queue a hedge intent, records metrics, and returns HTTP 202 with an
        optional txHash. Hedge intent creation failure does not roll back settlement;
        the response remains accepted but omits hedgeOrderId and the metrics endpoint
        increments rfq_hedge_intent_errors_total. Production deployments should treat
        RFQSettlement QuoteSettled events as the final settlement source of truth.
      tags:
        - Submit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuoteRequest"
      responses:
        "202":
          description: Submit accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitQuoteResponse"
        "400":
          description: Invalid submit request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Signed quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Quote expired, already used, signature invalid, or rejected by settlement verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Settlement verifier, chain RPC, or another settlement dependency is unavailable before settlement is applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quote/{quoteId}:
    get:
      operationId: getQuote
      summary: Get quote status by id
      tags:
        - Quote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteStatus"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Quote status store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /hedges/{hedgeOrderId}:
    get:
      operationId: getHedgeIntent
      summary: Get hedge intent status by id
      description: >
        Returns the queued hedge intent created after a submit request updates
        inventory. The initial reference implementation records hedge intent
        metadata in memory; production deployments should back this endpoint with
        a durable execution store.
      tags:
        - Hedge
      parameters:
        - name: hedgeOrderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hedge intent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HedgeIntentStatus"
        "404":
          description: Hedge intent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Hedge status store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /settlements/{settlementEventId}:
    get:
      operationId: getSettlementEvent
      summary: Get settlement event status by id
      description: >
        Returns the simulated settlement event consumed by the backend to update
        inventory. Production deployments should derive these records from
        RFQSettlement events using a chain id, transaction hash, and log index
        idempotency key.
      tags:
        - Settlement
      parameters:
        - name: settlementEventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement event status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementEventStatus"
        "404":
          description: Settlement event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Settlement event store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pnl:
    get:
      operationId: getPnlSummary
      summary: Get realized PnL summary
      description: >
        Returns realized spread PnL records generated by the simulated settlement
        path. The current reference model assumes normalized same-decimal example
        assets and records gross spread PnL in tokenOut base units.
      tags:
        - PnL
      responses:
        "200":
          description: Realized PnL summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlSummary"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: PnL store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - System
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      operationId: getReadiness
      summary: Readiness check
      description: Checks market data freshness and signer sign/verify capability before the instance is considered routable.
      tags:
        - System
      responses:
        "200":
          description: Service readiness and dependency state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Service is alive but not ready because at least one quote dependency is degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      tags:
        - System
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    UIntString:
      type: string
      pattern: "^[0-9]+$"
    IntString:
      type: string
      pattern: "^-?[0-9]+$"
    QuoteRequest:
      type: object
      required:
        - chainId
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - slippageBps
      properties:
        chainId:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/UIntString"
        slippageBps:
          type: integer
          minimum: 0
          maximum: 10000
    QuoteResponse:
      type: object
      required:
        - quoteId
        - snapshotId
        - amountOut
        - minAmountOut
        - deadline
        - nonce
        - signature
      properties:
        quoteId:
          type: string
        snapshotId:
          type: string
        amountOut:
          $ref: "#/components/schemas/UIntString"
        minAmountOut:
          $ref: "#/components/schemas/UIntString"
        deadline:
          type: integer
          description: Unix timestamp generated from the configured RFQ_QUOTE_TTL_SECONDS signed quote lifetime.
        nonce:
          $ref: "#/components/schemas/UIntString"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
          minLength: 132
          maxLength: 132
          description: 65-byte EIP-712 signature encoded as 0x-prefixed hex.
    SubmitQuoteRequest:
      type: object
      required:
        - quote
        - signature
      properties:
        quote:
          $ref: "#/components/schemas/SignedQuote"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          minLength: 132
          maxLength: 132
          description: 65-byte EIP-712 signature encoded as 0x-prefixed hex.
    SubmitQuoteResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - accepted
          description: The backend accepted the submit request for execution or simulated settlement.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
          description: Simulated or relayed transaction hash.
        settlementEventId:
          type: string
          description: Settlement event id consumed to update inventory.
        hedgeOrderId:
          type: string
          description: Hedge intent id queued after simulated settlement updates inventory. Omitted when post-trade hedge intent creation fails after settlement has already been accepted.
        pnlId:
          type: string
          description: PnL record id created after simulated settlement.
    SignedQuote:
      type: object
      description: >
        EIP-712 quote payload submitted for settlement. tokenIn and tokenOut must be
        different addresses, amountIn/amountOut/minAmountOut must be positive uint
        strings, and amountOut must be greater than or equal to minAmountOut.
      required:
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - minAmountOut
        - nonce
        - deadline
        - chainId
      properties:
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/UIntString"
        amountOut:
          $ref: "#/components/schemas/UIntString"
        minAmountOut:
          $ref: "#/components/schemas/UIntString"
        nonce:
          $ref: "#/components/schemas/UIntString"
        deadline:
          type: integer
        chainId:
          type: integer
    QuoteStatus:
      type: object
      required:
        - quoteId
        - status
      properties:
        quoteId:
          type: string
        status:
          type: string
          enum:
            - requested
            - rejected
            - signed
            - expired
            - submitted
            - settled
            - failed
        snapshotId:
          type: string
          description: Market data snapshot used for the quote when available.
        deadline:
          type: integer
          description: Unix timestamp after which a signed quote is no longer submittable.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
          description: Simulated or relayed transaction hash after submit.
        errorCode:
          type: string
          description: Internal rejection reason for rejected quote records when available.
    HedgeIntentStatus:
      type: object
      required:
        - hedgeOrderId
        - status
        - quoteId
        - chainId
        - token
        - side
        - amount
        - reason
        - createdAt
      properties:
        hedgeOrderId:
          type: string
        status:
          type: string
          enum:
            - queued
        quoteId:
          type: string
        chainId:
          type: integer
        token:
          $ref: "#/components/schemas/Address"
        side:
          type: string
          enum:
            - buy
            - sell
        amount:
          $ref: "#/components/schemas/UIntString"
        reason:
          type: string
          enum:
            - inventory_rebalance
            - risk_reduction
        createdAt:
          type: string
          format: date-time
    SettlementEventStatus:
      type: object
      required:
        - settlementEventId
        - status
        - quoteId
        - chainId
        - txHash
        - logIndex
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - observedAt
      properties:
        settlementEventId:
          type: string
        status:
          type: string
          enum:
            - applied
        quoteId:
          type: string
        chainId:
          type: integer
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
        logIndex:
          type: integer
          minimum: 0
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/UIntString"
        amountOut:
          $ref: "#/components/schemas/UIntString"
        observedAt:
          type: string
          format: date-time
    PnlTradeRecord:
      type: object
      required:
        - pnlId
        - quoteId
        - chainId
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - grossPnlTokenOut
        - grossPnlBps
        - model
        - realizedAt
      properties:
        pnlId:
          type: string
        quoteId:
          type: string
        chainId:
          type: integer
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/UIntString"
        amountOut:
          $ref: "#/components/schemas/UIntString"
        grossPnlTokenOut:
          $ref: "#/components/schemas/IntString"
        grossPnlBps:
          type: integer
        model:
          type: string
          enum:
            - simulated_mid_price_v1
        realizedAt:
          type: string
          format: date-time
    PnlSummary:
      type: object
      required:
        - status
        - totalTrades
        - grossPnlTokenOut
        - trades
      properties:
        status:
          type: string
          enum:
            - ok
        totalTrades:
          type: integer
          minimum: 0
        grossPnlTokenOut:
          $ref: "#/components/schemas/IntString"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/PnlTradeRecord"
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    ReadinessResponse:
      type: object
      required:
        - status
        - components
      properties:
        status:
          type: string
          enum:
            - ready
            - degraded
        components:
          type: object
          additionalProperties:
            type: string
            enum:
              - ok
              - degraded
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - traceId
      properties:
        code:
          type: string
          enum:
            - INVALID_REQUEST
            - UNSUPPORTED_CHAIN
            - UNSUPPORTED_TOKEN
            - AMOUNT_TOO_SMALL
            - AMOUNT_TOO_LARGE
            - MARKET_DATA_UNAVAILABLE
            - ROUTING_UNAVAILABLE
            - PRICING_UNAVAILABLE
            - RISK_REJECTED
            - SIGNER_UNAVAILABLE
            - INVALID_SIGNATURE
            - QUOTE_STORE_UNAVAILABLE
            - QUOTE_NOT_FOUND
            - QUOTE_EXPIRED
            - QUOTE_ALREADY_USED
            - QUOTE_FAILED
            - HEDGE_NOT_FOUND
            - HEDGE_STORE_UNAVAILABLE
            - SETTLEMENT_EVENT_NOT_FOUND
            - SETTLEMENT_EVENT_STORE_UNAVAILABLE
            - PNL_STORE_UNAVAILABLE
            - SETTLEMENT_UNAVAILABLE
            - SETTLEMENT_REVERTED
            - RATE_LIMITED
            - INTERNAL_ERROR
        message:
          type: string
        traceId:
          type: string
          pattern: "^tr_.+"
