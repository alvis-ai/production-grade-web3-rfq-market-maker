openapi: 3.1.0
info:
  title: Production-Grade Web3 RFQ Market Maker API
  version: 0.1.0
  description: API draft for RFQ quote, submit, health, and metrics flows. Every response includes an x-trace-id header for request correlation; structured error bodies also include the same traceId value. Clients may send a safe tr_-prefixed x-trace-id request header, which the gateway echoes after length and character validation; unsafe values fall back to a generated request id. Browser access is controlled by the RFQ_CORS_ALLOWED_ORIGINS allowlist, which only accepts normalized HTTP(S) URL origins without path, query, fragment, credentials, or wildcards. The gateway emits no-store cache control and baseline browser security headers on every response. Unknown routes and unsupported methods return the standard ErrorResponse shape.
servers:
  - url: http://localhost:3000
paths:
  /quote:
    post:
      operationId: createQuote
      summary: Request an RFQ quote
      tags:
        - Quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
            examples:
              default:
                value:
                  chainId: 1
                  user: "0x0000000000000000000000000000000000000001"
                  tokenIn: "0x0000000000000000000000000000000000000002"
                  tokenOut: "0x0000000000000000000000000000000000000003"
                  amountIn: "1000000000"
                  slippageBps: 50
      responses:
        "200":
          description: Signed quote
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
              examples:
                default:
                  value:
                    quoteId: "q_1893456000000_1"
                    snapshotId: "snapshot_1_00000000_00000000"
                    amountOut: "998400000"
                    minAmountOut: "993408000"
                    deadline: 1893456030
                    nonce: "1893456000000001"
                    signature: "0x1111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111"
        "400":
          description: Invalid request
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Risk rejected
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body too large
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Market data unavailable, stale, too far in the future, invalid, routing unavailable, quote store unavailable, signer unavailable, or another quote dependency unavailable
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /submit:
    post:
      operationId: submitQuote
      summary: Submit a signed quote through the backend relay or simulated settlement path
      description: >
        The first runnable skeleton applies a simulated settlement, updates inventory,
        attempts to queue a hedge intent, records metrics, and returns HTTP 202 with an
        optional txHash. Hedge intent creation failure does not roll back settlement;
        the response remains accepted but omits hedgeOrderId and the metrics endpoint
        increments rfq_hedge_intent_errors_total. The reference backend also records
        a bounded output-token quote risk penalty so follow-up quotes become more
        conservative after post-trade hedge failures. Production deployments should
        treat RFQSettlement QuoteSettled events as the final settlement source of truth.
        Submit first validates the canonical request shape, resolves the stored signed
        quote by chainId/user/nonce, and rejects signatures that differ from the
        signature returned by /quote before signer recovery or settlement verification.
      tags:
        - Submit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuoteRequest"
      responses:
        "202":
          description: Submit accepted for processing
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitQuoteResponse"
        "400":
          description: Invalid submit request
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Signed quote not found
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Quote expired, already used, signature invalid, or rejected by settlement verification
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body too large
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Settlement verifier, chain RPC, or another settlement dependency is unavailable before settlement is applied
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quote/{quoteId}:
    get:
      operationId: getQuote
      summary: Get quote status by id
      tags:
        - Quote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9_:-]+$"
          description: Quote identifier returned by POST /quote. The gateway accepts only 1 to 128 letters, numbers, underscore, colon, or hyphen characters.
      responses:
        "200":
          description: Quote status
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteStatus"
        "404":
          description: Quote not found
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Quote status store unavailable
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /hedges/{hedgeOrderId}:
    get:
      operationId: getHedgeIntent
      summary: Get hedge intent status by id
      description: >
        Returns the queued hedge intent created after a submit request updates
        inventory. The initial reference implementation records hedge intent
        metadata in memory; production deployments should back this endpoint with
        a durable execution store.
      tags:
        - Hedge
      parameters:
        - name: hedgeOrderId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9_:-]+$"
          description: Hedge order identifier returned by POST /submit. The gateway accepts only 1 to 128 letters, numbers, underscore, colon, or hyphen characters.
      responses:
        "200":
          description: Hedge intent status
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HedgeIntentStatus"
        "404":
          description: Hedge intent not found
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Hedge status store unavailable
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /settlements/{settlementEventId}:
    get:
      operationId: getSettlementEvent
      summary: Get settlement event status by id
      description: >
        Returns the simulated settlement event consumed by the backend to update
        inventory. Production deployments should derive these records from
        RFQSettlement events using a chain id, transaction hash, and log index
        idempotency key, and should persist the event block number for reorg-aware
        reconciliation.
      tags:
        - Settlement
      parameters:
        - name: settlementEventId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9_:-]+$"
          description: Settlement event identifier returned by POST /submit. The gateway accepts only 1 to 128 letters, numbers, underscore, colon, or hyphen characters.
      responses:
        "200":
          description: Settlement event status
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementEventStatus"
        "404":
          description: Settlement event not found
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Settlement event store unavailable
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pnl:
    get:
      operationId: getPnlSummary
      summary: Get realized PnL summary
      description: >
        Returns realized spread PnL records generated by the simulated settlement
        path. The current reference model assumes normalized same-decimal example
        assets and records gross spread PnL in tokenOut base units.
      tags:
        - PnL
      responses:
        "200":
          description: Realized PnL summary
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlSummary"
        "429":
          description: Rate limited
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: PnL store unavailable
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - System
      responses:
        "200":
          description: Service health
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      operationId: getReadiness
      summary: Readiness check
      description: Checks market data freshness, signer sign/verify capability, and lightweight state dependency probes before the instance is considered routable.
      tags:
        - System
      responses:
        "200":
          description: Service readiness and dependency state
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Service is alive but not ready because at least one quote dependency is degraded
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      tags:
        - System
      responses:
        "200":
          description: Prometheus text exposition
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceId"
          content:
            text/plain:
              schema:
                type: string
components:
  headers:
    TraceId:
      description: Request correlation id attached to every response. ErrorResponse.traceId contains the same value for structured error bodies. Safe tr_-prefixed request header values may be echoed; unsafe values are replaced with a generated request id.
      schema:
        type: string
        pattern: "^tr_.+"
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    UIntString:
      type: string
      pattern: "^[0-9]+$"
    PositiveUIntString:
      type: string
      pattern: "^[1-9][0-9]*$"
    IntString:
      type: string
      pattern: "^-?[0-9]+$"
    SafeIdentifier:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "^[A-Za-z0-9_:-]+$"
      description: Resource identifier containing only letters, numbers, underscore, colon, or hyphen.
    QuoteRequest:
      type: object
      additionalProperties: false
      required:
        - chainId
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - slippageBps
      properties:
        chainId:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer chain id.
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/PositiveUIntString"
        slippageBps:
          type: integer
          minimum: 0
          maximum: 10000
    QuoteResponse:
      type: object
      required:
        - quoteId
        - snapshotId
        - amountOut
        - minAmountOut
        - deadline
        - nonce
        - signature
      properties:
        quoteId:
          $ref: "#/components/schemas/SafeIdentifier"
        snapshotId:
          $ref: "#/components/schemas/SafeIdentifier"
        amountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        minAmountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        deadline:
          type: integer
          description: Unix timestamp generated from the configured RFQ_QUOTE_TTL_SECONDS signed quote lifetime.
        nonce:
          $ref: "#/components/schemas/PositiveUIntString"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          minLength: 132
          maxLength: 132
          description: 65-byte canonical low-s EIP-712 signature encoded as 0x-prefixed hex.
    SubmitQuoteRequest:
      type: object
      additionalProperties: false
      required:
        - quote
        - signature
      properties:
        quote:
          $ref: "#/components/schemas/SignedQuote"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          minLength: 132
          maxLength: 132
          description: 65-byte canonical low-s EIP-712 signature encoded as 0x-prefixed hex. The gateway rejects high-s signatures and v values other than 27/28 or normalized 0/1 before quote lookup or settlement verification.
    SubmitQuoteResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - accepted
          description: The backend accepted the submit request for execution or simulated settlement.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]{64}$"
          description: Simulated or relayed transaction hash.
        settlementEventId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: Settlement event id consumed to update inventory.
        hedgeOrderId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: Hedge intent id queued after simulated settlement updates inventory. Omitted when post-trade hedge intent creation fails after settlement has already been accepted; the reference backend then tightens follow-up quotes through output-token quote risk penalty.
        pnlId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: PnL record id created after simulated settlement.
    SignedQuote:
      type: object
      additionalProperties: false
      description: >
        EIP-712 quote payload submitted for settlement. tokenIn and tokenOut must be
        different addresses, amountIn/amountOut/minAmountOut/nonce must be
        positive uint strings, and amountOut must be greater than or equal to minAmountOut.
      required:
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - minAmountOut
        - nonce
        - deadline
        - chainId
      properties:
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/PositiveUIntString"
        amountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        minAmountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        nonce:
          $ref: "#/components/schemas/PositiveUIntString"
        deadline:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer Unix timestamp.
        chainId:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer chain id.
    QuoteStatus:
      type: object
      required:
        - quoteId
        - status
      properties:
        quoteId:
          $ref: "#/components/schemas/SafeIdentifier"
        status:
          type: string
          enum:
            - requested
            - rejected
            - signed
            - expired
            - submitted
            - settled
            - failed
        snapshotId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: Market data snapshot used for the quote when available.
        deadline:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Unix timestamp after which a signed quote is no longer submittable.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]{64}$"
          description: Simulated or relayed transaction hash after submit.
        settlementEventId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: Settlement event pointer after submit when available.
        hedgeOrderId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: Hedge order pointer after settlement when a hedge was queued.
        pnlId:
          $ref: "#/components/schemas/SafeIdentifier"
          description: Realized PnL record pointer after settlement attribution when available.
        errorCode:
          type: string
          description: Internal rejection reason for rejected quote records when available.
    HedgeIntentStatus:
      type: object
      required:
        - hedgeOrderId
        - status
        - settlementEventId
        - quoteId
        - chainId
        - token
        - side
        - amount
        - reason
        - createdAt
      properties:
        hedgeOrderId:
          $ref: "#/components/schemas/SafeIdentifier"
        status:
          type: string
          enum:
            - queued
        settlementEventId:
          $ref: "#/components/schemas/SafeIdentifier"
        quoteId:
          $ref: "#/components/schemas/SafeIdentifier"
        chainId:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer chain id.
        token:
          $ref: "#/components/schemas/Address"
        side:
          type: string
          enum:
            - buy
            - sell
        amount:
          $ref: "#/components/schemas/PositiveUIntString"
        reason:
          type: string
          enum:
            - inventory_rebalance
            - risk_reduction
        createdAt:
          type: string
          format: date-time
          description: Canonical UTC ISO timestamp generated with Date.prototype.toISOString().
    SettlementEventStatus:
      type: object
      required:
        - settlementEventId
        - status
        - quoteId
        - chainId
        - txHash
        - quoteHash
        - blockNumber
        - logIndex
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - observedAt
      properties:
        settlementEventId:
          $ref: "#/components/schemas/SafeIdentifier"
        status:
          type: string
          enum:
            - applied
        quoteId:
          $ref: "#/components/schemas/SafeIdentifier"
        chainId:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer chain id.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]{64}$"
        quoteHash:
          type: string
          pattern: "^0x[a-fA-F0-9]{64}$"
        blockNumber:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Non-negative JavaScript safe integer block number.
        logIndex:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Non-negative JavaScript safe integer event log index.
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/PositiveUIntString"
        amountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        observedAt:
          type: string
          format: date-time
          description: Canonical UTC ISO timestamp generated with Date.prototype.toISOString().
    PnlTradeRecord:
      type: object
      required:
        - pnlId
        - quoteId
        - chainId
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - minAmountOut
        - nonce
        - deadline
        - grossPnlTokenOut
        - grossPnlBps
        - model
        - realizedAt
      properties:
        pnlId:
          $ref: "#/components/schemas/SafeIdentifier"
        quoteId:
          $ref: "#/components/schemas/SafeIdentifier"
        chainId:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer chain id.
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/PositiveUIntString"
        amountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        minAmountOut:
          $ref: "#/components/schemas/PositiveUIntString"
        nonce:
          $ref: "#/components/schemas/PositiveUIntString"
        deadline:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: Positive JavaScript safe integer Unix timestamp.
        grossPnlTokenOut:
          $ref: "#/components/schemas/IntString"
        grossPnlBps:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Signed JavaScript safe integer realized gross PnL in basis points.
        model:
          type: string
          enum:
            - simulated_mid_price_v1
        realizedAt:
          type: string
          format: date-time
          description: Canonical UTC ISO timestamp generated with Date.prototype.toISOString().
    PnlSummary:
      type: object
      required:
        - status
        - totalTrades
        - grossPnlTokenOut
        - trades
      properties:
        status:
          type: string
          enum:
            - ok
        totalTrades:
          type: integer
          minimum: 0
        grossPnlTokenOut:
          $ref: "#/components/schemas/IntString"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/PnlTradeRecord"
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    ReadinessResponse:
      type: object
      required:
        - status
        - components
      properties:
        status:
          type: string
          enum:
            - ready
            - degraded
        components:
          type: object
          additionalProperties: false
          required:
            - marketData
            - marketSnapshotStore
            - routing
            - pricing
            - risk
            - signer
            - quoteRepository
            - riskDecisionStore
            - inventory
            - execution
            - settlementEventStore
            - pnl
            - metrics
          properties:
            marketData:
              $ref: "#/components/schemas/ReadinessComponentStatus"
            marketSnapshotStore:
              $ref: "#/components/schemas/ReadinessComponentStatus"
            routing:
              $ref: "#/components/schemas/ReadinessComponentStatus"
            pricing:
