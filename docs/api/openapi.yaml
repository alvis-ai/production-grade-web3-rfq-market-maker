openapi: 3.1.0
info:
  title: Production-Grade Web3 RFQ Market Maker API
  version: 0.1.0
  description: API draft for RFQ quote, submit, health, and metrics flows.
servers:
  - url: http://localhost:3000
paths:
  /quote:
    post:
      operationId: createQuote
      summary: Request an RFQ quote
      tags:
        - Quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
            examples:
              default:
                value:
                  chainId: 1
                  user: "0x0000000000000000000000000000000000000001"
                  tokenIn: "0x0000000000000000000000000000000000000002"
                  tokenOut: "0x0000000000000000000000000000000000000003"
                  amountIn: "1000000000"
                  slippageBps: 50
      responses:
        "200":
          description: Signed quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
              examples:
                default:
                  value:
                    quoteId: "q_1893456000000_1"
                    snapshotId: "snapshot_1_00000000_00000000"
                    amountOut: "998400000"
                    minAmountOut: "993408000"
                    deadline: 1893456030
                    nonce: "1893456000000001"
                    signature: "0x1111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Risk rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /submit:
    post:
      operationId: submitQuote
      summary: Submit a signed quote through the backend relay or simulated settlement path
      description: >
        The first runnable skeleton applies a simulated settlement, updates inventory,
        queues a hedge intent, records metrics, and returns HTTP 202 with an optional
        txHash. Production deployments should treat RFQSettlement QuoteSettled events as
        the final settlement source of truth.
      tags:
        - Submit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuoteRequest"
      responses:
        "202":
          description: Submit accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitQuoteResponse"
        "400":
          description: Invalid submit request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Signed quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Quote expired or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quote/{quoteId}:
    get:
      operationId: getQuote
      summary: Get quote status by id
      tags:
        - Quote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteStatus"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds until the client should retry.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - System
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      tags:
        - System
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    UIntString:
      type: string
      pattern: "^[0-9]+$"
    QuoteRequest:
      type: object
      required:
        - chainId
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - slippageBps
      properties:
        chainId:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/UIntString"
        slippageBps:
          type: integer
          minimum: 0
          maximum: 10000
    QuoteResponse:
      type: object
      required:
        - quoteId
        - snapshotId
        - amountOut
        - minAmountOut
        - deadline
        - nonce
        - signature
      properties:
        quoteId:
          type: string
        snapshotId:
          type: string
        amountOut:
          $ref: "#/components/schemas/UIntString"
        minAmountOut:
          $ref: "#/components/schemas/UIntString"
        deadline:
          type: integer
        nonce:
          $ref: "#/components/schemas/UIntString"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
          minLength: 132
          maxLength: 132
          description: 65-byte EIP-712 signature encoded as 0x-prefixed hex.
    SubmitQuoteRequest:
      type: object
      required:
        - quote
        - signature
      properties:
        quote:
          $ref: "#/components/schemas/SignedQuote"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          minLength: 132
          maxLength: 132
          description: 65-byte EIP-712 signature encoded as 0x-prefixed hex.
    SubmitQuoteResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - accepted
          description: The backend accepted the submit request for execution or simulated settlement.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
          description: Simulated or relayed transaction hash.
    SignedQuote:
      type: object
      description: >
        EIP-712 quote payload submitted for settlement. tokenIn and tokenOut must be
        different addresses, amountIn/amountOut/minAmountOut must be positive uint
        strings, and amountOut must be greater than or equal to minAmountOut.
      required:
        - user
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - minAmountOut
        - nonce
        - deadline
        - chainId
      properties:
        user:
          $ref: "#/components/schemas/Address"
        tokenIn:
          $ref: "#/components/schemas/Address"
        tokenOut:
          $ref: "#/components/schemas/Address"
        amountIn:
          $ref: "#/components/schemas/UIntString"
        amountOut:
          $ref: "#/components/schemas/UIntString"
        minAmountOut:
          $ref: "#/components/schemas/UIntString"
        nonce:
          $ref: "#/components/schemas/UIntString"
        deadline:
          type: integer
        chainId:
          type: integer
    QuoteStatus:
      type: object
      required:
        - quoteId
        - status
      properties:
        quoteId:
          type: string
        status:
          type: string
          enum:
            - requested
            - rejected
            - signed
            - expired
            - submitted
            - settled
            - failed
        snapshotId:
          type: string
          description: Market data snapshot used for the quote when available.
        deadline:
          type: integer
          description: Unix timestamp after which a signed quote is no longer submittable.
        txHash:
          type: string
          pattern: "^0x[a-fA-F0-9]+$"
          description: Simulated or relayed transaction hash after submit.
        errorCode:
          type: string
          description: Internal rejection reason for rejected quote records when available.
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - traceId
      properties:
        code:
          type: string
          enum:
            - INVALID_REQUEST
            - UNSUPPORTED_CHAIN
            - UNSUPPORTED_TOKEN
            - AMOUNT_TOO_SMALL
            - AMOUNT_TOO_LARGE
            - MARKET_DATA_UNAVAILABLE
            - PRICING_UNAVAILABLE
            - RISK_REJECTED
            - SIGNER_UNAVAILABLE
            - INVALID_SIGNATURE
            - QUOTE_NOT_FOUND
            - QUOTE_EXPIRED
            - QUOTE_ALREADY_USED
            - SETTLEMENT_REVERTED
            - RATE_LIMITED
            - INTERNAL_ERROR
        message:
          type: string
        traceId:
          type: string
          pattern: "^tr_.+"
